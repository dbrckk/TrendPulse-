<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Amazon Product | TrendPulse</title>
  <meta name="description" content="Amazon product details on TrendPulse." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://www.trend-pulse.shop/product.html" />

  <meta property="og:type" content="product" />
  <meta property="og:title" content="Amazon Product | TrendPulse" />
  <meta property="og:description" content="Amazon product details on TrendPulse." />
  <meta property="og:url" content="https://www.trend-pulse.shop/product.html" />
  <meta property="og:image" content="https://www.trend-pulse.shop/og-image.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Amazon Product | TrendPulse" />
  <meta name="twitter:description" content="Amazon product details on TrendPulse." />
  <meta name="twitter:image" content="https://www.trend-pulse.shop/og-image.jpg" />

  <meta name="theme-color" content="#09090b" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js?v=20260404-3" defer></script>
  <script src="/assets/js/product-page.js?v=20260404-1" defer></script>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">
  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-zinc-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold text-white">TrendPulse</a>
      <nav class="hidden md:flex items-center gap-5 text-sm text-zinc-300">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/deals.html" class="hover:text-white">Deals</a>
        <a href="/catalog.html" class="hover:text-white">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <nav class="mb-5 text-sm text-zinc-400">
      <a href="/" class="hover:text-white">Home</a>
      <span class="mx-2">/</span>
      <a href="/catalog.html" class="hover:text-white">Catalog</a>
      <span class="mx-2">/</span>
      <span id="product-breadcrumb" class="text-zinc-200">Product</span>
    </nav>

    <section class="grid gap-8 lg:grid-cols-2">
      <div class="rounded-[2rem] border border-zinc-800 bg-white p-6">
        <img
          id="product-image"
          src="https://via.placeholder.com/700x700?text=No+Image"
          alt="Product image"
          class="h-full w-full object-contain"
        />
      </div>

      <div class="rounded-[2rem] border border-zinc-800 bg-zinc-900/60 p-6">
        <div class="inline-flex rounded-full border border-zinc-700 px-3 py-1 text-[11px] font-medium text-zinc-300" id="product-category">
          General
        </div>

        <h1 id="product-title" class="mt-4 text-3xl font-bold tracking-tight text-white">
          Product
        </h1>

        <div id="product-rating" class="mt-3 text-sm text-zinc-400">
          ⭐ — (0)
        </div>

        <div id="product-price" class="mt-5 text-4xl font-bold text-green-400">
          $0.00
        </div>

        <p id="product-description" class="mt-6 text-sm leading-7 text-zinc-300">
          Product description.
        </p>

        <div class="mt-8 flex flex-wrap gap-3">
          <a
            id="product-buy-link"
            href="#"
            target="_blank"
            rel="nofollow sponsored noopener"
            class="inline-flex items-center justify-center rounded-full bg-green-500 px-6 py-3 text-sm font-semibold text-black transition hover:opacity-90"
          >
            Buy on Amazon
          </a>

          <a
            href="/deals.html"
            class="inline-flex items-center justify-center rounded-full border border-zinc-700 px-6 py-3 text-sm font-semibold text-zinc-200 transition hover:border-zinc-500 hover:text-white"
          >
            Browse Deals
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
