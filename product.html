<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Product | TrendPulse</title>
  <meta
    name="description"
    content="Browse Amazon products on TrendPulse."
  />
  <link id="canonical-url" rel="canonical" href="https://www.trend-pulse.shop/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-3xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-6 text-sm text-zinc-300">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/deals" class="hover:text-white">Deals</a>
        <a href="/catalog" class="hover:text-white">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-6 text-sm text-zinc-400">
      <a href="/" class="hover:text-white">Home</a>
      <span> / </span>
      <a href="/catalog" class="hover:text-white">Catalog</a>
      <span> / </span>
      <span id="product-breadcrumb">Product</span>
    </div>

    <section class="grid gap-8 md:grid-cols-2">
      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
        <div class="mb-4 flex items-center gap-2">
          <span id="product-source-badge" class="hidden rounded-full border border-zinc-700 px-3 py-1 text-xs text-zinc-300"></span>
          <span id="product-discount-badge" class="hidden rounded-full bg-red-500 px-3 py-1 text-xs font-bold text-white"></span>
        </div>

        <img
          id="product-image"
          src="https://via.placeholder.com/700x700?text=No+Image"
          alt="Product image"
          class="h-auto w-full rounded-2xl bg-white object-contain"
        />
      </div>

      <div>
        <div class="mb-3 text-sm uppercase tracking-wide text-zinc-400">
          <span id="product-category">General</span>
        </div>

        <div id="product-hook" class="mb-3 text-sm font-semibold text-green-400"></div>

        <h1 id="product-title" class="text-4xl font-bold">Product</h1>

        <div id="product-rating" class="mt-4 text-zinc-400">⭐ — (0)</div>
        <div id="product-urgency" class="mt-2 text-sm font-medium text-red-400"></div>
        <div id="product-proof" class="mt-2 text-sm text-zinc-400"></div>

        <div class="mt-6 flex items-center gap-3">
          <div id="product-price" class="text-3xl font-bold text-green-400">$0.00</div>
          <div id="product-original-price" class="text-lg text-zinc-500 line-through">$0.00</div>
        </div>

        <p id="product-price-story" class="mt-4 text-sm text-zinc-400"></p>

        <p id="product-description" class="mt-6 max-w-2xl text-zinc-300">
          Product description.
        </p>

        <div class="mt-8">
          <a
            id="product-buy-link"
            href="#"
            target="_blank"
            rel="nofollow sponsored noopener"
            class="inline-block rounded-2xl bg-green-500 px-6 py-3 text-base font-bold text-black"
          >
            Buy on Amazon
          </a>
        </div>
      </div>
    </section>

    <section class="mt-10 grid gap-4 md:grid-cols-3">
      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-5">
        <div class="text-xs uppercase tracking-wide text-zinc-500">Value</div>
        <div id="product-value-box" class="mt-2 text-sm text-zinc-300"></div>
      </div>

      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-5">
        <div class="text-xs uppercase tracking-wide text-zinc-500">Demand</div>
        <div id="product-demand-box" class="mt-2 text-sm text-zinc-300"></div>
      </div>

      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-5">
        <div class="text-xs uppercase tracking-wide text-zinc-500">Type</div>
        <div id="product-type-box" class="mt-2 text-sm text-zinc-300"></div>
      </div>
    </section>

    <section class="mt-10 rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
      <h2 class="text-xl font-semibold">Why this product is here</h2>
      <p id="product-why-text" class="mt-3 text-zinc-300"></p>
      <div id="related-product-categories" class="mt-4 flex flex-wrap gap-3"></div>
    </section>

    <section class="mt-12">
      <h2 class="text-2xl font-semibold">Related products</h2>
      <div id="related-products" class="mt-6 grid grid-cols-2 gap-4 md:grid-cols-4"></div>
    </section>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/product-page.js"></script>
  <script src="/assets/js/trendpulse-analytics.js"></script>
</body>
</html>
