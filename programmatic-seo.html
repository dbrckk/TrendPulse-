<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | TrendPulse</title>
  <meta
    name="description"
    content="Browse curated Amazon product collections on TrendPulse."
  />
  <link id="canonical-url" rel="canonical" href="https://www.trend-pulse.shop/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-3xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-6 text-sm text-zinc-300">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/deals" class="hover:text-white">Deals</a>
        <a href="/catalog" class="hover:text-white">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-6 text-sm text-zinc-400">
      <a href="/" class="hover:text-white">Home</a>
      <span> / </span>
      <a href="/catalog" class="hover:text-white">Collections</a>
      <span> / </span>
      <span id="collection-breadcrumb">Collection</span>
    </div>

    <section class="mb-10">
      <div class="max-w-4xl">
        <div class="mb-3 inline-flex rounded-full border border-zinc-800 bg-zinc-900 px-3 py-1 text-xs font-medium text-zinc-300">
          Curated Collection
        </div>

        <h1 id="collection-title" class="text-4xl font-bold">Collection</h1>

        <p id="collection-description" class="mt-3 text-lg text-zinc-400">
          Loading collection...
        </p>

        <div id="collection-count" class="mt-4 text-sm text-zinc-500">
          Loading products...
        </div>
      </div>
    </section>

    <section class="mb-12">
      <div id="collection-grid" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4"></div>

      <div
        id="collection-empty-state"
        class="hidden rounded-2xl border border-zinc-800 bg-zinc-900 p-6 text-center text-zinc-400"
      >
        No products found
      </div>
    </section>

    <section class="mb-12 rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
      <h2 class="text-xl font-semibold">About this collection</h2>
      <p id="collection-seo-text" class="mt-3 max-w-4xl leading-7 text-zinc-300">
        Loading collection details...
      </p>
    </section>

    <section class="mb-12">
      <h2 class="text-xl font-semibold">Explore related collections</h2>
      <div id="collection-related-links" class="mt-4 flex flex-wrap gap-3"></div>
    </section>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/trendpulse-data.js"></script>
  <script src="/assets/js/trendpulse-ui.js"></script>
  <script src="/assets/js/programmatic-seo.js"></script>
  <script src="/assets/js/trendpulse-analytics.js"></script>
</body>
</html>
