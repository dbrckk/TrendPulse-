<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | TrendPulse</title>
  <meta name="description" content="Browse curated Amazon product collections." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-4 text-sm text-zinc-300">
        <a href="/">Home</a>
        <a href="/deals">Deals</a>
        <a href="/catalog">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-8">
      <h1 id="collection-title" class="text-3xl font-bold">Collection</h1>
      <p id="collection-description" class="mt-2 text-zinc-400">Loading collection...</p>
      <div id="collection-count" class="mt-3 text-sm text-zinc-500">Loading products...</div>
    </div>

    <div id="products-container" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4"></div>

    <div class="mt-10">
      <h2 class="text-lg font-semibold">About this collection</h2>
      <p id="collection-seo-text" class="mt-2 text-zinc-400"></p>
    </div>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/trendpulse-data.js"></script>
  <script src="/assets/js/trendpulse-ui.js"></script>
  <script>
    (async function () {
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug = (pathParts[0] === "collections" && pathParts[1]) ? decodeURIComponent(pathParts[1]) : "";

      const response = await fetch("/programmatic-pages.json");
      const pages = await response.json();
      const config = pages.find((page) => page.slug === slug);

      if (!config) {
        document.getElementById("collection-title").textContent = "Collection not found";
        document.getElementById("collection-description").textContent = "This collection does not exist.";
        return;
      }

      document.title = `${config.title} | TrendPulse`;
      document.getElementById("collection-title").textContent = config.title;
      document.getElementById("collection-description").textContent = config.description;
      document.getElementById("collection-seo-text").textContent = config.seoText || config.description;

      const products = await window.TrendPulseData.fetchCollectionProducts(config, 24);
      window.TrendPulseUI.renderProducts(products, "#products-container");
      document.getElementById("collection-count").textContent = `${products.length} ${products.length === 1 ? "product" : "products"}`;
    })();
  </script>
</body>
</html>
