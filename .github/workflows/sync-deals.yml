name: Sync TrendPulse Deals

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: https://trend-pulse.shop
        run: node sync-deals.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml deals.html tech.html kitchen.html beauty.html home.html best-amazon-deals.html best-tech-deals-under-50.html best-kitchen-deals-this-week.html best-beauty-deals-on-amazon.html best-home-deals-this-week.html deal
          git diff --cached --quiet || git commit -m "Update generated SEO pages, static deal pages, and sitemap"
          git push
