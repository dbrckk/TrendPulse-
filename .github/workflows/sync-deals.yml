name: Sync Deals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Sync Deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node sync-deals.js

      - name: Update Score
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f update-score.js ]; then
            node update-score.js
          else
            echo "update-score.js not found, skipping."
          fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            deals.html \
            sitemap.xml \
            best-amazon-deals.html \
            best-sellers.html \
            crazy-deals.html \
            tech.html \
            fashion.html \
            jewelry.html \
            shoes.html \
            sports.html \
            health.html \
            baby.html \
            pets.html \
            office.html \
            gaming.html \
            outdoor.html \
            home.html \
            kitchen.html \
            beauty.html || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Auto-update generated deal pages"
            git push
          fi
