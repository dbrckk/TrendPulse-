# .github/workflows/sync-deals.yml

name: Sync Deals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run sync-deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node sync-deals.js

      - name: Run update-score
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f update-score.js ]; then
            node update-score.js
          else
            echo "update-score.js not found, skipping."
          fi

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            sitemap.xml \
            robots.txt \
            tweet-state.json \
            x-session.json || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Auto-update generated metadata"
            git push
          fi
