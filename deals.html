<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Deals | TrendPulse</title>
  <meta name="description" content="Browse strong Amazon deals curated from the latest feed and high-demand products." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-4 text-sm text-zinc-300">
        <a href="/">Home</a>
        <a href="/deals" class="text-white">Deals</a>
        <a href="/catalog">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Latest Amazon Deals</h1>
      <p class="mt-2 text-zinc-400">Good deals first. If there are no live deals, the page automatically falls back to strong Amazon products.</p>
      <div id="resultCount" class="mt-3 text-sm text-zinc-500">Loading deals...</div>
    </div>

    <div id="products-container" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4"></div>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/trendpulse-data.js"></script>
  <script src="/assets/js/trendpulse-ui.js"></script>
</body>
</html>
