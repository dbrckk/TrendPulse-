<!DOCTYPE html>
<html lang="en">
<head>

    content="Browse Amazon deals today on TrendPulse. Discover trending products, live deals, and high-demand finds."
  />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Amazon Deals Today | TrendPulse" />
  <meta
    property="og:description"
    content="Browse Amazon deals today on TrendPulse."
  />
  <meta property="og:url" content="https://www.trend-pulse.shop/deals" />
  <meta property="og:image" content="https://www.trend-pulse.shop/og-image.jpg" />

  <meta name="twitter:card" content="summary_large_image" />

    content="Browse Amazon deals today on TrendPulse."
  />

  <meta name="theme-color" content="#09090b" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js?v=20260405-2" defer></script>
  <script src="/assets/js/product-hooks.js?v=20260405-2" defer></script>
  <script src="/assets/js/trendpulse-ui.js?v=20260405-2" defer></script>
</head>

<body class="bg-zinc-950 pb-24 text-zinc-100 antialiased md:pb-0">

  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-zinc-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold text-white">TrendPulse</a>

      <nav class="hidden md:flex items-center gap-5 text-sm text-zinc-300">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/deals" class="text-white">Deals</a>
        <a href="/catalog" class="hover:text-white">Catalog</a>
      </nav>

      <a
        href="/catalog"
        class="rounded-full border border-zinc-700 px-4 py-2 text-sm text-zinc-200 transition hover:border-zinc-500 hover:text-white"
      >
        Catalog
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6 sm:py-8">

    <nav class="mb-5 text-sm text-zinc-400">
      <a href="/" class="hover:text-white">Home</a>
      <span class="mx-2">/</span>
      <span class="text-zinc-200">Deals</span>
    </nav>

    <section class="rounded-[2rem] border border-zinc-800 bg-gradient-to-b from-zinc-900 to-zinc-950 p-6 shadow-2xl shadow-black/20 sm:p-8">
      <p class="text-xs uppercase tracking-[0.22em] text-zinc-400">Live Deals</p>
      <h1 class="mt-3 text-4xl font-bold tracking-tight text-white sm:text-5xl">Amazon Deals Today</h1>
      <p class="mt-4 max-w-3xl text-base leading-7 text-zinc-300">
        Discover trending products, strong deals, and high-demand Amazon finds.
      </p>

      <div class="mt-5 flex flex-wrap gap-2">
        <span class="rounded-full bg-red-500/15 px-3 py-1 text-xs font-medium text-red-300">Selling fast</span>
        <span class="rounded-full bg-green-500/15 px-3 py-1 text-xs font-medium text-green-300">Live now</span>
        <span class="rounded-full bg-blue-500/15 px-3 py-1 text-xs font-medium text-blue-300">Best value</span>
      </div>
    </section>

    <section class="mt-6 grid gap-3 rounded-[2rem] border border-zinc-800 bg-zinc-900/60 p-4 sm:grid-cols-2 xl:grid-cols-4">
      <div>
        <label for="searchInput" class="mb-2 block text-xs uppercase tracking-[0.18em] text-zinc-500">Search</label>
        <input
          id="searchInput"
          type="text"
          placeholder="Search deals..."
          class="w-full rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none"
        />
      </div>

      <div>
        <label for="categoryFilter" class="mb-2 block text-xs uppercase tracking-[0.18em] text-zinc-500">Category</label>
        <select
          id="categoryFilter"
          class="w-full rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none"
        >
          <option value="all">All categories</option>
          <option value="tech">Tech</option>
          <option value="home">Home</option>
          <option value="kitchen">Kitchen</option>
          <option value="beauty">Beauty</option>
          <option value="health">Health</option>
          <option value="sports">Sports</option>
          <option value="travel">Travel</option>
          <option value="fashion">Fashion</option>
          <option value="family">Family</option>
          <option value="general">General</option>
        </select>
      </div>

      <div>
        <label for="priceFilter" class="mb-2 block text-xs uppercase tracking-[0.18em] text-zinc-500">Price</label>
        <select
          id="priceFilter"
          class="w-full rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none"
        >
          <option value="all">All prices</option>
          <option value="under-10">Under $10</option>
          <option value="under-25">Under $25</option>
          <option value="under-50">Under $50</option>
        </select>
      </div>

      <div>
        <label for="sortFilter" class="mb-2 block text-xs uppercase tracking-[0.18em] text-zinc-500">Sort</label>
        <select
          id="sortFilter"
          class="w-full rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none"
        >
          <option value="score">Best ranked</option>
          <option value="reviews">Most reviews</option>
          <option value="rating">Best rating</option>
          <option value="low">Lowest price</option>
          <option value="high">Highest price</option>
        </select>
      </div>
    </section>

    <section class="mt-6 flex items-center justify-between gap-3">
      <div id="resultCount" class="text-sm font-medium text-zinc-400">0 deals</div>
      <a href="/catalog" class="text-sm text-zinc-400 hover:text-white">Browse catalog →</a>
    </section>

    <section class="mt-8">
      <div id="deals-grid" class="grid grid-cols-2 gap-4 lg:grid-cols-4"></div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-50 border-t border-zinc-800 bg-zinc-950/98 backdrop-blur md:hidden">
    <div class="grid grid-cols-3">
      <a href="/" class="py-3 text-center text-sm text-zinc-400">Home</a>
      <a href="/deals" class="py-3 text-center text-sm text-white">Deals</a>
      <a href="/catalog" class="py-3 text-center text-sm text-zinc-400">Catalog</a>
    </div>
  </nav>

</body>
      </html>
