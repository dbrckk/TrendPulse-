<!-- deal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal | TrendPulse</title>

  <meta name="description" content="View product details and get the best deal on Amazon." />
  <meta name="robots" content="index,follow" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/trendpulse-data.js" defer></script>
  <script src="/assets/js/trendpulse-ui.js" defer></script>
</head>

<body class="bg-zinc-950 text-zinc-100">

<main class="max-w-2xl mx-auto px-4 py-8">

  <!-- IMAGE -->
  <img id="product-image" class="w-full rounded-xl" />

  <!-- TITLE -->
  <h1 id="product-title" class="text-xl font-bold mt-4"></h1>

  <!-- PRICE -->
  <div class="flex items-center gap-2 mt-2">
    <span id="product-price" class="text-2xl font-bold text-green-400"></span>
    <span id="product-old-price" class="text-sm line-through text-zinc-500"></span>
  </div>

  <!-- TRUST BADGES -->
  <div class="mt-3 text-xs text-zinc-400 space-y-1">
    <div>✔ Fast shipping on Amazon</div>
    <div>✔ Easy returns</div>
    <div>✔ Secure checkout</div>
  </div>

  <!-- CTA -->
  <a
    id="buy-btn"
    target="_blank"
    class="block mt-6 bg-green-500 text-black font-bold text-center py-4 rounded-xl text-lg"
  >
    View on Amazon →
  </a>

  <!-- SECOND CTA -->
  <a
    id="buy-btn-2"
    target="_blank"
    class="block mt-3 border border-zinc-700 text-center py-3 rounded-xl text-sm"
  >
    Check price on Amazon
  </a>

  <!-- URGENCY -->
  <p class="mt-4 text-xs text-zinc-500">
    ⚠ Prices can change quickly. Check availability on Amazon.
  </p>

  <!-- DESCRIPTION -->
  <div class="mt-6 text-sm text-zinc-300 space-y-3">
    <p id="product-description"></p>
  </div>

  <!-- BENEFITS -->
  <div class="mt-6 bg-zinc-900 p-4 rounded-xl">
    <h2 class="font-semibold mb-2">Why people buy this</h2>
    <ul class="text-sm text-zinc-400 space-y-1">
      <li>• Simple and useful product</li>
      <li>• Good price for value</li>
      <li>• Popular choice on Amazon</li>
    </ul>
  </div>

</main>

</body>
</html>
