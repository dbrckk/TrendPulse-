<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="title">Best Amazon Deal | TrendPulse</title>
<meta name="description" id="desc" content="Best Amazon deal available now.">

<link rel="icon" href="/favicon.ico">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { background:#000; color:white; font-family:system-ui; }
.badge { font-size:12px; padding:4px 10px; border-radius:999px; font-weight:bold; }
</style>
</head>

<body class="max-w-4xl mx-auto px-4 py-6">

<header class="flex justify-between mb-6">
  <a href="/" class="font-black italic text-xl">TrendPulse</a>
  <span class="text-zinc-400 text-sm">Amazon Deal</span>
</header>

<div id="product"></div>

<section class="mt-12">
  <h2 class="text-xl font-bold mb-4">🔥 Similar Deals</h2>
  <div id="related" class="grid grid-cols-2 gap-4"></div>
</section>

<script>
const SB_URL = "https://hyrofyfhmabhlqbucjdp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs";

const sb = supabase.createClient(SB_URL, SB_KEY);

const path = window.location.pathname.split("/");
const asin = path[2];

async function trackEvent(asin, type){
  try {
    await sb.from("analytics").insert({ asin, event:type });
  } catch(e){}
}

// 🔥 BADGE SYSTEM
function getBadges(p){
  let badges = [];

  if(p.score > 80) badges.push({text:"🔥 Trending", color:"bg-red-500"});
  if(p.discount_percent > 40) badges.push({text:"⚡ Hot Deal", color:"bg-yellow-500"});
  if(p.price < 25) badges.push({text:"💰 Best Value", color:"bg-green-500"});
  if(p.clicks > 20) badges.push({text:"👀 Popular", color:"bg-blue-500"});

  return badges;
}

async function loadProduct(){

  const { data } = await sb
    .from("products")
    .select("*")
    .eq("asin", asin)
    .single();

  if(!data) return;

  trackEvent(data.asin,"view");

  const img = data.image_url || `https://images.amazon.com/images/P/${data.asin}.01._SX500_.jpg`;

  document.title = `${data.name} - $${data.price}`;
  document.getElementById("desc").content =
    `${data.name} now at $${data.price}. Save ${Math.round(data.discount_percent)}% today.`;

  const badges = getBadges(data);

  document.getElementById("product").innerHTML = `
    <div class="bg-zinc-900 rounded-2xl p-6">

      <img src="${img}" class="w-full h-80 object-contain bg-white rounded-xl mb-6">

      <div class="flex gap-2 flex-wrap mb-3">
        ${badges.map(b => `<span class="badge ${b.color}">${b.text}</span>`).join("")}
      </div>

      <div class="text-red-400 font-bold mb-2">
        🔥 ${Math.round(data.discount_percent)}% OFF
      </div>

      <h1 class="text-2xl font-black mb-4">
        ${data.name}
      </h1>

      <div class="flex items-end gap-4 mb-6">
        <div class="text-3xl font-black">$${data.price}</div>
        <div class="text-zinc-500 line-through">$${data.original_price || (data.price+20)}</div>
      </div>

      <a href="${data.affiliate_link}" target="_blank"
         onclick="trackEvent('${data.asin}','click')"
         class="block text-center bg-blue-600 py-4 rounded-xl font-black text-lg">
        👉 View Deal on Amazon
      </a>

      <div class="mt-6 text-sm text-zinc-400">
        ⏳ Price may change quickly. Deals are time-limited.
      </div>

    </div>
  `;

  loadRelated(data.category);
}

async function loadRelated(cat){
  const { data } = await sb
    .from("products")
    .select("*")
    .eq("category", cat)
    .limit(6);

  const container = document.getElementById("related");
  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("a");
    div.href = `/deal/${p.asin}/${slug(p.name)}/`;

    const img = p.image_url || `https://images.amazon.com/images/P/${p.asin}.01._SX300_.jpg`;

    div.className = "bg-zinc-900 rounded-xl overflow-hidden";

    div.innerHTML = `
      <img src="${img}" class="w-full h-32 object-cover bg-white">
      <div class="p-2 text-sm font-bold line-clamp-2">${p.name}</div>
    `;

    container.appendChild(div);
  });
}

function slug(t){
  return t.toLowerCase().replace(/[^a-z0-9]+/g,"-");
}

loadProduct();
</script>

</body>
</html>
