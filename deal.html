<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Amazon Deal | TrendPulse</title>
  <meta name="description" content="Check this Amazon deal with discount, price, and availability. Limited time offer." />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="/favicon.ico" sizes="any" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: system-ui, sans-serif;
    }

    .soft-card {
      background: linear-gradient(180deg, #111722 0%, #090b11 100%);
      border: 1px solid rgba(255,255,255,.08);
    }

    .cta {
      background: #ff9900;
      color: black;
      font-weight: 900;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      display: block;
    }

    .cta:hover {
      background: #ffb84d;
    }

    .sticky-cta {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      z-index: 50;
    }
  </style>
</head>

<body class="max-w-4xl mx-auto px-4 py-6 pb-28">

  <!-- HEADER -->
  <header class="mb-6 flex justify-between items-center">
    <a href="/" class="text-2xl font-black italic">TrendPulse</a>
    <a href="/deals.html" class="text-sm text-zinc-400 hover:text-white">All Deals</a>
  </header>

  <!-- CONTENT -->
  <main id="content" class="soft-card rounded-3xl p-6">
    Loading deal...
  </main>

  <!-- STICKY CTA -->
  <div id="sticky-cta" class="sticky-cta hidden">
    <a id="sticky-link" href="#" class="cta text-lg">
      🔥 Buy on Amazon
    </a>
  </div>

  <script>
    const SB_URL = "https://hyrofyfhmabhlqbucjdp.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const params = new URLSearchParams(window.location.search);
    const asin = params.get("asin");

    function formatPrice(v) {
      if (!v) return "Check price";
      return "$" + Number(v).toFixed(2);
    }

    function getImages(asin, image) {
      return [
        image,
        `https://m.media-amazon.com/images/I/${asin}.jpg`,
        `https://images-na.ssl-images-amazon.com/images/P/${asin}.01.LZZZZZZZ.jpg`
      ];
    }

    function buildImage(images) {
      const safe = JSON.stringify(images).replace(/"/g, "&quot;");
      return `
        <img src="${images[0]}"
             data-images="${safe}"
             data-index="0"
             class="w-full h-72 object-contain bg-white rounded-2xl"
             onerror="nextImg(this)">
      `;
    }

    window.nextImg = function(img) {
      const imgs = JSON.parse(img.dataset.images);
      let i = Number(img.dataset.index) + 1;
      if (i >= imgs.length) return;
      img.dataset.index = i;
      img.src = imgs[i];
    };

    function badge(p) {
      if (p.is_crazy_deal) return "⚠ CRAZY DEAL";
      if (p.discount_percent) return `🔥 ${Math.round(p.discount_percent)}% OFF`;
      return "LIVE DEAL";
    }

    function urgency(p) {
      if (p.is_crazy_deal) return "⚡ May disappear fast";
      if (p.discount_percent > 50) return "🔥 Big discount";
      return "Limited time offer";
    }

    async function load() {
      if (!asin) {
        document.getElementById("content").innerHTML = "No product found.";
        return;
      }

      const { data } = await sb
        .from("products")
        .select("*")
        .eq("asin", asin)
        .single();

      if (!data) {
        document.getElementById("content").innerHTML = "Deal not found.";
        return;
      }

      const images = getImages(data.asin, data.image_url);

      document.title = data.name + " | TrendPulse";

      document.getElementById("content").innerHTML = `
        <div class="mb-4 text-red-400 font-black text-sm">
          ${badge(data)}
        </div>

        ${buildImage(images)}

        <h1 class="text-2xl md:text-3xl font-black mt-4 mb-2">
          ${data.name}
        </h1>

        <div class="flex items-end gap-3 mb-3 flex-wrap">
          <div class="text-3xl font-black">
            ${formatPrice(data.price)}
          </div>
          ${data.original_price ? `<div class="line-through text-zinc-500">${formatPrice(data.original_price)}</div>` : ""}
        </div>

        <div class="text-orange-400 font-bold mb-4">
          ${urgency(data)}
        </div>

        <a href="${data.affiliate_link}" target="_blank" class="cta text-lg mb-4">
          🔥 Buy on Amazon
        </a>

        <div class="text-sm text-zinc-400 leading-6">
          ${data.description || "Check this trending Amazon deal."}
        </div>
      `;

      document.getElementById("sticky-link").href = data.affiliate_link;
      document.getElementById("sticky-cta").classList.remove("hidden");
    }

    load();
  </script>

</body>
</html>
