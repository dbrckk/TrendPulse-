<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title id="page-title">Best Amazon Deal | TrendPulse</title>
  <meta name="description" id="page-description" content="Best Amazon deal available now." />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" id="page-canonical" href="https://trend-pulse.shop/deal.html" />
  <meta name="theme-color" content="#050505" />

  <meta property="og:type" content="product" />
  <meta property="og:title" id="og-title" content="Best Amazon Deal | TrendPulse" />
  <meta property="og:description" id="og-description" content="Best Amazon deal available now." />
  <meta property="og:image" id="og-image" content="https://trend-pulse.shop/og-image.jpg" />
  <meta property="og:url" id="og-url" content="https://trend-pulse.shop/deal.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="twitter-title" content="Best Amazon Deal | TrendPulse" />
  <meta name="twitter:description" id="twitter-description" content="Best Amazon deal available now." />
  <meta name="twitter:image" id="twitter-image" content="https://trend-pulse.shop/og-image.jpg" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { background:#050505; color:white; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .badge { font-size:12px; padding:5px 10px; border-radius:999px; font-weight:800; letter-spacing:.01em; }
    .line-clamp-2 {
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .line-clamp-3 {
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
  </style>
</head>

<body class="max-w-5xl mx-auto px-4 py-6">

  <header class="flex justify-between items-center mb-6">
    <a href="/" class="font-black italic text-2xl tracking-tight">TrendPulse</a>
    <div class="text-zinc-400 text-sm">Amazon Deal</div>
  </header>

  <main>
    <div id="product"></div>

    <section class="mt-12">
      <div class="flex items-end justify-between mb-4 gap-4">
        <div>
          <h2 class="text-2xl font-black tracking-tight">🔥 Similar Deals</h2>
          <p class="text-zinc-400 text-sm mt-1">More offers from the same category.</p>
        </div>
      </div>
      <div id="related" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
    </section>
  </main>

  <script>
    const SITE_URL = "https://trend-pulse.shop";
    const SB_URL = "https://hyrofyfhmabhlqbucjdp.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const asin = pathParts[1] || new URLSearchParams(window.location.search).get("asin");

    function slug(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 80);
    }

    function formatPrice(v) {
      if (v === null || v === undefined || v === "") return "Check price";
      const n = Number(v);
      if (Number.isNaN(n)) return "Check price";
      return `$${n.toFixed(n % 1 === 0 ? 0 : 2)}`;
    }

    function fallbackImage(name) {
      const safe = String(name || "Trending Deal").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return `data:image/svg+xml;utf8,
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900">
        <rect width="100%" height="100%" fill="%23070a11"/>
        <text x="50%" y="42%" text-anchor="middle" fill="white" font-size="56" font-family="Arial" font-weight="800">TrendPulse</text>
        <text x="50%" y="58%" text-anchor="middle" fill="%23cbd5e1" font-size="32" font-family="Arial">${safe}</text>
      </svg>`;
    }

    function trackOnce(key) {
      try {
        if (localStorage.getItem(key)) return false;
        localStorage.setItem(key, "1");
        return true;
      } catch {
        return true;
      }
    }

    async function trackEvent(asin, type) {
      try {
        await sb.from("analytics").insert({
          asin: asin,
          event: type
        });
      } catch (e) {}
    }

    function getBadges(p) {
      const badges = [];
      const score = Number(p.score || 0);
      const discount = Number(p.discount_percent || 0);
      const price = Number(p.price || 0);
      const clicks = Number(p.clicks || 0);

      if (score > 80) badges.push({ text: "🔥 Trending", color: "bg-red-500 text-white" });
      if (discount > 40) badges.push({ text: "⚡ Hot Deal", color: "bg-yellow-400 text-black" });
      if (price > 0 && price < 25) badges.push({ text: "💰 Best Value", color: "bg-green-500 text-black" });
      if (clicks > 20) badges.push({ text: "👀 Popular", color: "bg-blue-500 text-white" });

      return badges.slice(0, 3);
    }

    function setSeo(data, img, canonicalUrl) {
      const title = `${data.name} - ${formatPrice(data.price)} | TrendPulse`;
      const description = `${data.name} now at ${formatPrice(data.price)}${data.discount_percent ? ` with ${Math.round(data.discount_percent)}% off` : ""}. Check this Amazon deal on TrendPulse.`;

      document.title = title;
      document.getElementById("page-title").textContent = title;
      document.getElementById("page-description").setAttribute("content", description);
      document.getElementById("page-canonical").setAttribute("href", canonicalUrl);

      document.getElementById("og-title").setAttribute("content", title);
      document.getElementById("og-description").setAttribute("content", description);
      document.getElementById("og-image").setAttribute("content", img);
      document.getElementById("og-url").setAttribute("content", canonicalUrl);

      document.getElementById("twitter-title").setAttribute("content", title);
      document.getElementById("twitter-description").setAttribute("content", description);
      document.getElementById("twitter-image").setAttribute("content", img);
    }

    async function loadProduct() {
      if (!asin) {
        document.getElementById("product").innerHTML = `
          <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
            <h1 class="text-2xl font-black mb-2">Deal not found</h1>
            <p class="text-zinc-400">The product identifier is missing.</p>
          </div>
        `;
        return;
      }

      const { data, error } = await sb
        .from("products")
        .select("*")
        .eq("asin", asin)
        .single();

      if (error || !data) {
        document.getElementById("product").innerHTML = `
          <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
            <h1 class="text-2xl font-black mb-2">Deal not found</h1>
            <p class="text-zinc-400">This deal may have expired or been removed.</p>
          </div>
        `;
        return;
      }

      if (trackOnce("view_" + data.asin)) {
        trackEvent(data.asin, "view");
      }

      const dealSlug = slug(data.name);
      const canonicalUrl = `${SITE_URL}/deal/${data.asin}/${dealSlug}/`;
      const img = data.image_url || `https://images.amazon.com/images/P/${data.asin}.01._SX500_.jpg`;

      setSeo(data, img, canonicalUrl);

      const badges = getBadges(data);

      document.getElementById("product").innerHTML = `
        <article class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 md:p-7">
          <div class="grid md:grid-cols-2 gap-8 items-start">
            <div>
              <img src="${img}"
                   alt="${data.name}"
                   class="w-full h-80 md:h-[420px] object-contain bg-white rounded-2xl"
                   onerror="this.onerror=null;this.src='${fallbackImage(data.name)}';">
            </div>

            <div>
              <div class="flex gap-2 flex-wrap mb-3">
                ${badges.map(b => `<span class="badge ${b.color}">${b.text}</span>`).join("")}
              </div>

              <div class="text-red-400 font-black text-sm mb-2">
                ${data.discount_percent ? `🔥 ${Math.round(data.discount_percent)}% OFF` : "🔥 Deal Available"}
              </div>

              <h1 class="text-3xl md:text-4xl font-black tracking-tight leading-tight mb-4">
                ${data.name}
              </h1>

              <div class="flex items-end gap-4 mb-6 flex-wrap">
                <div class="text-4xl font-black">${formatPrice(data.price)}</div>
                <div class="text-zinc-500 line-through text-xl">${formatPrice(data.original_price || ((Number(data.price) || 0) + 20))}</div>
              </div>

              <div class="text-zinc-400 leading-7 mb-6">
                ${data.description || "Trending Amazon deal worth checking right now. Prices can change quickly, so it may be worth looking before the offer expires."}
              </div>

              <a href="${data.affiliate_link}"
                 target="_blank"
                 rel="nofollow sponsored noopener noreferrer"
                 onclick="trackEvent('${data.asin}', 'click')"
                 class="block text-center bg-blue-600 hover:bg-blue-500 transition py-4 rounded-2xl font-black text-lg">
                👉 View Deal on Amazon
              </a>

              <div class="mt-5 text-sm text-zinc-400">
                ⏳ Price may change quickly. Deals are often time-limited.
              </div>

              <div class="mt-6 grid grid-cols-2 gap-3 text-sm">
                <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-4">
                  <div class="text-zinc-500 mb-1">Category</div>
                  <div class="font-bold">${data.category || "All"}</div>
                </div>
                <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-4">
                  <div class="text-zinc-500 mb-1">Score</div>
                  <div class="font-bold">${Math.round(Number(data.score || 0))}</div>
                </div>
              </div>
            </div>
          </div>
        </article>
      `;

      loadRelated(data.category, data.asin);
    }

    async function loadRelated(category, currentAsin) {
      const { data } = await sb
        .from("products")
        .select("*")
        .eq("category", category)
        .neq("asin", currentAsin)
        .eq("is_active", true)
        .order("score", { ascending: false })
        .limit(6);

      const container = document.getElementById("related");
      container.innerHTML = "";

      (data || []).forEach(p => {
        const img = p.image_url || `https://images.amazon.com/images/P/${p.asin}.01._SX300_.jpg`;

        const card = document.createElement("a");
        card.href = `/deal/${p.asin}/${slug(p.name)}/`;
        card.className = "bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden block";

        card.innerHTML = `
          <img src="${img}"
               class="w-full h-36 object-cover bg-white"
               alt="${p.name}"
               onerror="this.onerror=null;this.src='${fallbackImage(p.name)}';">
          <div class="p-3">
            <div class="text-red-400 font-black text-xs mb-1">
              ${p.discount_percent ? `-${Math.round(p.discount_percent)}%` : "Deal"}
            </div>
            <div class="text-sm font-black line-clamp-2 mb-2">${p.name}</div>
            <div class="text-lg font-black">${formatPrice(p.price)}</div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    loadProduct();
  </script>
</body>
  </html>
