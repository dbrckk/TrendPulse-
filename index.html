<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse - Swipe & Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; touch-action: none; overflow: hidden; font-family: sans-serif; }
        .card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease; }
        .swipe-overlay { position: absolute; top: 20px; font-weight: 900; font-size: 3rem; opacity: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen bg-slate-900">

    <div class="absolute top-6 z-50 text-white text-center">
        <h1 class="text-xl font-black tracking-tighter italic">TRENDPULSE</h1>
        <p id="sub-header" class="text-[10px] opacity-50 uppercase tracking-widest">Loading trends...</p>
    </div>

    <div id="app" class="relative w-full max-w-md h-[75vh] px-4 mt-10">
        </div>

    <script>
        // CONFIGURATION (Garde ta clé Anon ici)
        const supabase = supabase.createClient('https://hyrofyfhmabhlqbucjdp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs');

        // DÉTECTION DE LANGUE
        const userLang = navigator.language || navigator.userLanguage; 
        const isFR = userLang.startsWith('fr');
        
        const texts = {
            fr: { sub: "Tendances du jour", shop: "ACHETER", end: "Plus de produits ! 🔥", swipeRight: "COUL", swipeLeft: "BOF" },
            en: { sub: "Daily Trends", shop: "SHOP NOW", end: "No more trends! 🔥", swipeRight: "COOL", swipeLeft: "PASS" }
        };
        const activeText = isFR ? texts.fr : texts.en;
        document.getElementById('sub-header').innerText = activeText.sub;

        async function loadProducts() {
            const { data: products, error } = await supabase.from('products').select('*');
            if (error) return;

            const container = document.getElementById('app');
            container.innerHTML = ''; 

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = "absolute inset-0 bg-white rounded-[40px] shadow-2xl overflow-hidden card border-4 border-white active:scale-95 transition-transform";
                card.style.zIndex = products.length - index;
                
                // On utilise les colonnes existantes pour le contenu
                card.innerHTML = `
                    <div class="h-3/5 relative">
                        <img src="${product.image_url}" class="w-full h-full object-cover pointer-events-none">
                    </div>
                    <div class="p-8">
                        <span class="text-blue-600 font-bold text-xs uppercase tracking-widest">${product.tagline || 'NEW'}</span>
                        <h2 class="text-3xl font-black text-gray-900 leading-none mt-2">${product.name}</h2>
                        <p class="text-gray-500 text-sm mt-3 font-medium">${product.description}</p>
                        
                        <div class="absolute bottom-8 left-8 right-8 flex justify-between items-center">
                            <span class="text-3xl font-black text-gray-900">${product.price}€</span>
                            <a href="${product.affiliate_link}" target="_blank" class="bg-black text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-transform uppercase">
                                ${activeText.shop}
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                setupSwipe(card);
            });
        }

        function setupSwipe(el) {
            let startX, startY, moveX, moveY;
            
            el.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            });

            el.addEventListener('touchmove', e => {
                moveX = e.touches[0].clientX - startX;
                moveY = e.touches[0].clientY - startY;
                let rotation = moveX / 15;
                el.style.transform = `translateX(${moveX}px) translateY(${moveY / 5}px) rotate(${rotation}deg)`;
                el.style.opacity = 1 - (Math.abs(moveX) / 800);
            });

            el.addEventListener('touchend', e => {
                if (Math.abs(moveX) > 130) {
                    // Animation de sortie
                    el.style.transform = `translateX(${moveX > 0 ? 1000 : -1000}px) rotate(${moveX > 0 ? 45 : -45}deg)`;
                    el.style.opacity = 0;
                    setTimeout(() => el.remove(), 300);
                    if (document.querySelectorAll('.card').length <= 1) {
                        document.getElementById('app').innerHTML = `<div class="text-white text-center mt-20 font-bold">${activeText.end}</div>`;
                    }
                } else {
                    // Retour à la normale
                    el.style.transform = 'translateX(0px) rotate(0deg)';
                    el.style.opacity = 1;
                }
                moveX = 0;
            });
        }

        loadProducts();
    </script>
</body>
</html>
