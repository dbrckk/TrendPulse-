<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; overflow: hidden; touch-action: none; font-family: sans-serif; }
        .card { transition: transform 0.3s ease, opacity 0.3s ease; position: absolute; inset: 0; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div class="absolute top-10 text-white text-center z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">TRENDPULSE</h1>
        <p id="msg" class="text-xs opacity-50 uppercase tracking-widest">Initialisation...</p>
    </div>

    <div id="app" class="relative w-[90%] h-[70vh] max-w-md">
        </div>

    <script>
        const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const msg = document.getElementById('msg');
            try {
                const { data: products, error } = await supabaseClient.from('products').select('*');
                
                if (error) throw error;
                if (!products || products.length === 0) {
                    msg.innerText = "Base de données vide empty";
                    return;
                }

                msg.innerText = "Swiper pour découvrir";
                const container = document.getElementById('app');

                products.forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-[30px] shadow-2xl overflow-hidden card border-4 border-white";
                    card.style.zIndex = products.length - i;
                    card.innerHTML = `
                        <img src="${p.image_url}" class="w-full h-2/3 object-cover pointer-events-none">
                        <div class="p-6">
                            <h2 class="text-xl font-bold text-gray-800">${p.name}</h2>
                            <p class="text-gray-500 text-xs mt-1">${p.description}</p>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-xl font-black">${p.price}€</span>
                                <a href="${p.affiliate_link}" target="_blank" class="bg-black text-white px-6 py-2 rounded-xl text-sm font-bold">SHOP</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                    addSwipe(card);
                });
            } catch (e) {
                msg.innerText = "Erreur de connexion : " + e.message;
                console.error(e);
            }
        }

        function addSwipe(el) {
            let startX = 0;
            el.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            el.addEventListener('touchmove', e => {
                let x = e.touches[0].clientX - startX;
                el.style.transform = `translateX(${x}px) rotate(${x/15}deg)`;
            });
            el.addEventListener('touchend', e => {
                let x = e.changedTouches[0].clientX - startX;
                if (Math.abs(x) > 120) {
                    el.style.transform = `translateX(${x > 0 ? 1000 : -1000}px)`;
                    el.style.opacity = 0;
                } else {
                    el.style.transform = 'none';
                }
            });
        }

        init();
    </script>
</body>
</html>
