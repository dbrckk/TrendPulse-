<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        .card-container { perspective: 1000px; }
        .card { 
            transition: transform 0.1s ease-out; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #111;
            border: 1px solid #222;
        }
        .btn-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .gradient-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <header class="absolute top-8 z-50 text-center">
        <h1 class="text-2xl font-black tracking-tighter uppercase italic">TrendPulse</h1>
        <div id="status" class="text-[10px] text-blue-400 font-bold tracking-[0.3em] uppercase mt-1">Discover Luxury</div>
    </header>

    <div id="app" class="relative w-full max-w-[380px] h-[75vh] card-container">
        </div>

    <div class="absolute bottom-10 flex gap-8 z-50">
        <div class="w-14 h-14 rounded-full btn-glass flex items-center justify-center text-red-500 text-xl">✕</div>
        <div class="w-14 h-14 rounded-full btn-glass flex items-center justify-center text-green-500 text-xl">♥</div>
    </div>

    <script>
        const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const isFR = (navigator.language || 'en').startsWith('fr');

        async function fetchTrends() {
            const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: false });
            if (error) return console.error(error);
            renderCards(data);
        }

        function renderCards(products) {
            const container = document.getElementById('app');
            products.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "absolute inset-0 rounded-[40px] overflow-hidden card select-none";
                card.style.zIndex = products.length - i;
                
                card.innerHTML = `
                    <div class="relative h-full w-full">
                        <img src="${p.image_url}" class="w-full h-full object-cover pointer-events-none">
                        <div class="gradient-overlay absolute inset-0"></div>
                        <div class="absolute bottom-0 p-8 w-full">
                            <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">${p.tagline}</span>
                            <h2 class="text-3xl font-black mt-2 leading-none uppercase">${p.name}</h2>
                            <p class="text-gray-400 text-sm mt-3 line-clamp-2 font-medium">${p.description}</p>
                            <div class="flex justify-between items-center mt-8">
                                <span class="text-3xl font-light">${p.price}€</span>
                                <a href="${p.affiliate_link}" target="_blank" class="bg-white text-black px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-tighter hover:bg-blue-400 transition-colors">
                                    ${isFR ? 'Acheter' : 'Get it'}
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                initSwipe(card);
            });
        }

        function initSwipe(el) {
            let startX, startY, isDragging = false;

            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isDragging = true;
                el.style.transition = 'none';
            });

            el.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                let moveX = e.touches[0].clientX - startX;
                let moveY = e.touches[0].clientY - startY;
                let rotation = moveX / 15;
                el.style.transform = `translateX(${moveX}px) translateY(${moveY / 3}px) rotate(${rotation}deg)`;
            });

            el.addEventListener('touchend', (e) => {
                isDragging = false;
                let moveX = e.changedTouches[0].clientX - startX;
                el.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s';

                if (Math.abs(moveX) > 150) {
                    el.style.transform = `translateX(${moveX > 0 ? 1500 : -1500}px) rotate(${moveX > 0 ? 45 : -45}deg)`;
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 500);
                } else {
                    el.style.transform = 'translateX(0px) translateY(0px) rotate(0deg)';
                }
            });
        }

        fetchTrends();
    </script>
</body>
</html>
