<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendPulse</title>
  <meta name="description" content="Discover Amazon deals and high-demand products on TrendPulse." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-3xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-6 text-sm text-zinc-300">
        <a href="/" class="text-white">Home</a>
        <a href="/deals">Deals</a>
        <a href="/catalog">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <section class="mb-8">
      <h1 class="text-4xl font-bold">Trending Amazon Products</h1>
      <p class="mt-3 max-w-3xl text-lg text-zinc-400">
        Discover strong Amazon deals and best-selling products. If there are no live deals,
        the page automatically falls back to proven Amazon products.
      </p>
      <div id="home-status" class="mt-4 text-sm text-zinc-500">Loading products...</div>
    </section>

    <section>
      <div id="deals" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4"></div>
    </section>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/trendpulse-data.js"></script>
  <script src="/assets/js/product-hooks.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (typeof window.loadDeals === "function") {
        window.loadDeals();
      } else {
        console.error("loadDeals is not defined");
        const status = document.getElementById("home-status");
        if (status) status.textContent = "Error loading products";
      }
    });
  </script>
</body>
</html>
