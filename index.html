<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔥 Best Amazon Deals Today (Up to 70% OFF)</title>
  <meta name="description" content="Discover the best Amazon deals updated daily. Save up to 70% on tech, fashion, home, and more.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta property="og:title" content="Best Amazon Deals Today">
  <meta property="og:description" content="Up to 70% OFF Amazon deals updated daily">
  <meta property="og:type" content="website">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f7f7f7;
    }

    .hero {
      background: black;
      color: white;
      text-align: center;
      padding: 30px 15px;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
    }

    .hero p {
      margin: 10px 0;
      opacity: 0.8;
    }

    .cta {
      background: #ff9900;
      padding: 12px 20px;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
    }

    .price {
      font-weight: bold;
      color: green;
    }

    .buy {
      display: block;
      margin-top: 8px;
      background: #ff9900;
      padding: 8px;
      border-radius: 6px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>🔥 Best Amazon Deals Today</h1>
  <p>Up to 70% OFF • Updated daily</p>
  <a href="#deals" class="cta">Shop Now</a>
</div>

<!-- DEALS -->
<div id="deals" class="grid" id="deals-container">
  <!-- inject via JS -->
</div>

<script>
fetch('/deals.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('deals');

    data.slice(0, 50).forEach(p => {
      const el = document.createElement('div');
      el.className = 'card';

      el.innerHTML = `
        <img src="${p.image}">
        <h4>${p.title}</h4>
        <div class="price">$${p.price}</div>
        <a href="${p.affiliate_link}" target="_blank" class="buy">Buy on Amazon</a>
      `;

      container.appendChild(el);
    });
  });
</script>

</body>
</html>
