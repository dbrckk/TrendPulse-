<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TrendPulse | Best Deals Only</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .card-stack {
      position: relative;
      width: 100%;
      height: 70vh;
      perspective: 1200px;
    }

    .card {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      border-radius: 38px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      will-change: transform;
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .card-overlay {
      background: linear-gradient(
        0deg,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.65) 42%,
        rgba(0,0,0,0.15) 70%,
        rgba(0,0,0,0) 100%
      );
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .promo-pill {
      background: #ff3b30;
      color: white;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 0.8rem;
      box-shadow: 0 4px 15px rgba(255, 59, 48, 0.35);
    }

    .empty-state,
    .loading-state,
    .error-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #a1a1aa;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 38px;
      background: #0a0a0a;
    }

    .badge {
      background: #18181b;
      border: 1px solid #27272a;
      color: #a1a1aa;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="flex flex-col h-screen py-6 px-5">

  <header class="w-full flex justify-between items-center mb-4">
    <div class="flex flex-col">
      <h1 class="text-2xl font-[900] tracking-tighter italic">TRENDPULSE</h1>
      <div class="flex items-center gap-2 mt-1">
        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Live Amazon Deals</span>
      </div>
    </div>

    <div id="deal-count" class="badge">0 Deals</div>
  </header>

  <main id="app" class="card-stack max-w-sm mx-auto w-full"></main>

  <footer class="w-full max-w-xs mx-auto flex justify-around items-center mt-6 mb-4">
    <button
      id="btn-nope"
      onclick="forceSwipe('left')"
      class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-500 text-2xl"
      aria-label="Passer"
    >
      ✕
    </button>

    <button
      id="btn-like"
      onclick="forceSwipe('right')"
      class="w-20 h-20 rounded-full bg-white flex items-center justify-center text-black shadow-2xl"
      aria-label="Voir le deal"
    >
      <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>

    <div class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-yellow-500 opacity-40 text-2xl">
      🔥
    </div>
  </footer>

  <script>
    const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let products = [];
    let currentIndex = 0;
    let isAnimating = false;

    function getDislikedIds() {
      try {
        return JSON.parse(localStorage.getItem('tp_nopes') || '[]');
      } catch {
        return [];
      }
    }

    function setDislikedIds(ids) {
      localStorage.setItem('tp_nopes', JSON.stringify(ids));
    }

    function recordNope(id) {
      const nopes = getDislikedIds();
      if (!nopes.includes(id)) {
        nopes.push(id);
        setDislikedIds(nopes);
      }
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === '') return '';
      const num = Number(value);
      if (Number.isNaN(num)) return '';
      return num % 1 === 0 ? `${num}€` : `${num.toFixed(2)}€`;
    }

    function getAmazonImageUrl(asin) {
      if (!asin) return '';
      return `https://ws-na.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&MarketPlace=US&Operation=GetImage&ASIN=${encodeURIComponent(asin)}&Service=Amazon&TemplateId=LargeImage`;
    }

    function getDisplayImage(product) {
      if (product.image_url && String(product.image_url).trim() !== '') {
        return product.image_url;
      }
      return getAmazonImageUrl(product.asin);
    }

    function getDisplayAffiliateLink(product) {
      if (product.affiliate_link && String(product.affiliate_link).trim() !== '') {
        return product.affiliate_link;
      }
      if (product.asin) {
        return `https://www.amazon.com/dp/${product.asin}`;
      }
      return '#';
    }

    function sanitizeText(text) {
      return String(text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateDealCount() {
      const remaining = Math.max(products.length - currentIndex, 0);
      document.getElementById('deal-count').innerText = `${remaining} DEALS`;
    }

    function renderLoading() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="loading-state">
          <div>
            <div class="text-white text-xl font-extrabold mb-2">Chargement...</div>
            <div class="text-sm text-zinc-500">On récupère les meilleurs deals.</div>
          </div>
        </div>
      `;
      updateDealCount();
    }

    function renderError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="error-state">
          <div>
            <div class="text-red-400 text-xl font-extrabold mb-2">Erreur</div>
            <div class="text-sm text-zinc-400">${sanitizeText(message)}</div>
          </div>
        </div>
      `;
      updateDealCount();
    }

    function renderEmpty() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="empty-state">
          <div>
            <div class="text-white text-xl font-extrabold mb-2">Aucun deal disponible</div>
            <div class="text-sm text-zinc-500">Reviens plus tard pour voir de nouvelles promos.</div>
          </div>
        </div>
      `;
      updateDealCount();
    }

    async function load() {
      renderLoading();

      try {
        const dislikedIds = getDislikedIds();

        const { data, error } = await sb
          .from('products')
          .select(`
            id,
            name,
            description,
            price,
            image_url,
            affiliate_link,
            asin,
            original_price,
            likes,
            nopes,
            category,
            discount_percent,
            created_at
          `)
          .not('asin', 'is', null)
          .gt('discount_percent', 10)
          .order('discount_percent', { ascending: false })
          .limit(50);

        if (error) {
          console.error('Erreur Supabase:', error);
          renderError(error.message || 'Impossible de charger les deals.');
          return;
        }

        const cleaned = (data || []).filter(item => {
          if (!item) return false;
          if (!item.id) return false;
          if (!item.name) return false;
          if (!item.asin) return false;
          if (dislikedIds.includes(item.id)) return false;
          return true;
        });

        products = cleaned;
        currentIndex = 0;
        updateDealCount();

        if (products.length === 0) {
          renderEmpty();
          return;
        }

        renderStack();
      } catch (err) {
        console.error(err);
        renderError(err.message || 'Erreur inattendue.');
      }
    }

    function renderStack() {
      const container = document.getElementById('app');
      container.innerHTML = '';

      const remaining = products.slice(currentIndex, currentIndex + 2);
      updateDealCount();

      if (remaining.length === 0) {
        renderEmpty();
        return;
      }

      remaining.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.zIndex = 10 - i;
        card.style.transform = `scale(${1 - i * 0.06}) translateY(${i * 18}px)`;

        const imageUrl = getDisplayImage(p);
        const shopUrl = getDisplayAffiliateLink(p);
        const safeName = sanitizeText(p.name);
        const safeDescription = sanitizeText(p.description || '');
        const hasOriginalPrice = p.original_price !== null && p.original_price !== undefined && p.original_price !== '';
        const originalPriceHtml = hasOriginalPrice
          ? `<span class="text-xs text-zinc-500 line-through">${formatPrice(p.original_price)}</span>`
          : '';

        const discount = Number(p.discount_percent || 0);
        const showDiscount = Number.isFinite(discount) && discount > 0 ? Math.round(discount) : 0;

        card.innerHTML = `
          <img
            src="${imageUrl}"
            alt="${safeName}"
            class="w-full h-full object-cover p-8 bg-white"
            onerror="this.onerror=null; this.src='https://placehold.co/800x1000/111111/FFFFFF?text=No+Image';"
          >
          <div class="card-overlay"></div>

          <div class="absolute top-5 left-5 right-5 flex justify-between items-center">
            <span class="promo-pill">-${showDiscount}% OFF</span>
            ${p.category ? `<span class="badge">${sanitizeText(p.category)}</span>` : ''}
          </div>

          <div class="absolute bottom-0 p-6 w-full">
            <h2 class="text-2xl font-extrabold leading-tight mb-2 line-clamp-2 uppercase italic">${safeName}</h2>

            ${safeDescription
              ? `<p class="text-sm text-zinc-300 mb-4 line-clamp-2">${safeDescription}</p>`
              : ''
            }

            <div class="flex justify-between items-end gap-4">
              <div class="flex flex-col min-w-0">
                ${originalPriceHtml}
                <span class="text-4xl font-black">${formatPrice(p.price)}</span>
              </div>

              <a
                href="${shopUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-sm uppercase shrink-0"
              >
                Shop Deal
              </a>
            </div>
          </div>
        `;

        container.appendChild(card);

        if (i === 0) {
          initDrag(card);
        }
      });
    }

    function initDrag(el) {
      let startX = 0;
      let moveX = 0;
      let isDragging = false;

      const onTouchStart = (e) => {
        if (isAnimating) return;
        startX = e.touches[0].clientX;
        moveX = 0;
        isDragging = true;
        el.style.transition = 'none';
      };

      const onTouchMove = (e) => {
        if (!isDragging || isAnimating) return;
        moveX = e.touches[0].clientX - startX;
        const rotation = moveX / 18;
        el.style.transform = `translate3d(${moveX}px, 0, 0) rotate(${rotation}deg)`;
      };

      const onTouchEnd = () => {
        if (!isDragging || isAnimating) return;

        isDragging = false;
        el.style.transition = 'transform 0.35s ease';

        if (Math.abs(moveX) > 120) {
          const direction = moveX > 0 ? 'right' : 'left';
          swipeCurrent(direction);
        } else {
          el.style.transform = 'translate3d(0,0,0) rotate(0deg)';
        }
      };

      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: true });
      el.addEventListener('touchend', onTouchEnd, { passive: true });
    }

    function swipeCurrent(direction) {
      if (isAnimating) return;

      const currentProduct = products[currentIndex];
      const card = document.querySelector('.card');
      if (!card || !currentProduct) return;

      isAnimating = true;

      if (direction === 'left') {
        recordNope(currentProduct.id);
      }

      card.style.transition = 'transform 0.35s ease, opacity 0.25s ease';
      card.style.opacity = '0.9';
      card.style.transform = `translate3d(${direction === 'right' ? 1000 : -1000}px, 0, 0) rotate(${direction === 'right' ? 18 : -18}deg)`;

      setTimeout(() => {
        currentIndex++;
        isAnimating = false;
        renderStack();
      }, 250);
    }

    window.forceSwipe = function(dir) {
      swipeCurrent(dir);
    };

    load();
  </script>
</body>
</html>
