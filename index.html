<body>

  <script>
    const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';

    const sb = supabase.createClient(SB_URL, SB_KEY);

    let products = [];
    let currentIndex = 0;
    let isAnimating = false;
    let isLoading = false;

    function getSkippedIds() {
      try {
        return JSON.parse(localStorage.getItem('tp_nopes') || '[]');
      } catch {
        return [];
      }
    }

    function setSkippedIds(ids) {
      localStorage.setItem('tp_nopes', JSON.stringify(ids));
    }

    function recordSkip(id) {
      const skipped = getSkippedIds();
      if (!skipped.includes(id)) {
        skipped.push(id);
        setSkippedIds(skipped);
      }
    }

    function clearNopesAndReload() {
      localStorage.removeItem('tp_nopes');
      load();
    }

    function vibrate(ms = 40) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function sanitizeText(text) {
      return String(text || '')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === '') return '';
      const num = Number(value);
      if (Number.isNaN(num)) return '';
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: num % 1 === 0 ? 0 : 2
      }).format(num);
    }

    function getDisplayImage(product) {
      if (product.image_url && String(product.image_url).trim() !== '') {
        return product.image_url;
      }
      if (product.asin) {
        return `https://images.amazon.com/images/P/${product.asin}.01._SX500_.jpg`;
      }
      return '';
    }

    function getDisplayAffiliateLink(product) {
      if (product.affiliate_link && String(product.affiliate_link).trim() !== '') {
        return product.affiliate_link;
      }
      if (product.asin) {
        return `https://www.amazon.com/dp/${product.asin}`;
      }
      return '#';
    }

    function getDisplayDiscount(product) {
      const dp = Number(product.discount_percent || 0);
      if (Number.isFinite(dp) && dp > 0) return Math.round(dp);

      const price = Number(product.price);
      const original = Number(product.original_price);

      if (Number.isFinite(price) && Number.isFinite(original) && original > price && original > 0) {
        return Math.round(((original - price) / original) * 100);
      }

      return 0;
    }

    function getDisplayScore(product) {
      const base = Number(product.score || 0);
      const likes = Number(product.likes || 0);
      const nopes = Number(product.nopes || 0);
      const smartScore = base + (likes * 2) - (nopes * 1);
      return Number.isFinite(smartScore) ? Math.round(smartScore) : 0;
    }

    function getDealLabel(product) {
      const discount = getDisplayDiscount(product);
      const price = Number(product.price || 0);
      const score = getDisplayScore(product);

      if (discount >= 50) return '🔥 Huge Discount';
      if (price > 0 && price <= 25) return '💸 Under $25';
      if (score >= 40) return '⭐ Best Value';
      return '⚡ Trending Now';
    }

    function updateDealCount() {
      const remaining = Math.max(products.length - currentIndex, 0);
      document.getElementById('deal-count').innerText = `${remaining} Deals`;
    }

    function setButtonsDisabled(disabled) {
      document.getElementById('btn-nope').disabled = disabled;
      document.getElementById('btn-like').disabled = disabled;
      document.getElementById('refresh-btn').disabled = disabled;
    }

    function renderState(title, text, isError = false) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="status-box">
          <div>
            <h2 class="status-title ${isError ? 'text-red-400' : 'text-white'}">${sanitizeText(title)}</h2>
            <p class="status-text">${sanitizeText(text)}</p>
          </div>
        </div>
      `;
      updateDealCount();
    }

    function createFallbackSVG(name, category) {
      const safeName = sanitizeText(name || 'Trending Deal');
      const safeCategory = sanitizeText(category || 'Amazon Deal');

      return `data:image/svg+xml;utf8,
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="%23131a28"/>
            <stop offset="100%" stop-color="%23070a10"/>
          </linearGradient>
        </defs>
        <rect width="1200" height="1600" fill="url(%23g)"/>
        <circle cx="600" cy="430" r="220" fill="%232563eb" opacity="0.14"/>
        <text x="600" y="320" text-anchor="middle" fill="white" font-size="72" font-family="Arial, sans-serif" font-weight="800">TrendPulse</text>
        <text x="600" y="405" text-anchor="middle" fill="%23cbd5e1" font-size="34" font-family="Arial, sans-serif">${safeCategory}</text>
        <text x="600" y="760" text-anchor="middle" fill="white" font-size="66" font-family="Arial, sans-serif" font-weight="900">Image unavailable</text>
        <text x="600" y="850" text-anchor="middle" fill="%23a1a1aa" font-size="34" font-family="Arial, sans-serif">Open the deal to view it on Amazon</text>
        <foreignObject x="120" y="980" width="960" height="340">
          <div xmlns="http://www.w3.org/1999/xhtml" style="color:white;font-size:52px;line-height:1.08;font-family:Arial,sans-serif;font-weight:900;text-align:center;">
            ${safeName}
          </div>
        </foreignObject>
      </svg>`;
    }

    async function load() {
      if (isLoading) return;

      isLoading = true;
      setButtonsDisabled(true);
      renderState('Loading deals...', 'Fetching the hottest Amazon deals right now.');

      try {
        const skippedIds = getSkippedIds();

        const { data, error } = await sb
          .from('products')
          .select(`
            id,
            name,
            tagline,
            description,
            price,
            image_url,
            affiliate_link,
            asin,
            original_price,
            likes,
            nopes,
            category,
            discount_percent,
            score,
            created_at,
            updated_at,
            is_active
          `)
          .eq('is_active', true)
          .not('asin', 'is', null)
          .order('score', { ascending: false })
          .order('discount_percent', { ascending: false })
          .limit(100);

        if (error) {
          console.error('Supabase error:', error);
          renderState('Unable to load deals', error.message || 'Please try again shortly.', true);
          return;
        }

        products = (data || [])
          .filter(item => {
            if (!item || !item.id || !item.name || !item.asin) return false;
            if (skippedIds.includes(item.id)) return false;
            return true;
          })
          .sort((a, b) => getDisplayScore(b) - getDisplayScore(a));

        currentIndex = 0;
        updateDealCount();

        if (!products.length) {
          renderState('No deals available', 'Refresh later or reset your skipped deals.');
          return;
        }

        renderStack();
      } catch (err) {
        console.error(err);
        renderState('Unexpected error', err.message || 'Something went wrong.', true);
      } finally {
        isLoading = false;
        setButtonsDisabled(false);
      }
    }

    function renderStack() {
      const container = document.getElementById('app');
      container.innerHTML = '';

      const remaining = products.slice(currentIndex, currentIndex + 2);
      updateDealCount();

      if (!remaining.length) {
        renderState('You are all caught up', 'Refresh to load new deals or reset skipped items.');
        return;
      }

      remaining.forEach((p, i) => {
        const card = document.createElement('article');
        card.className = 'deal-card';
        card.style.zIndex = 10 - i;
        card.style.transform = `scale(${1 - i * 0.05}) translateY(${i * 16}px)`;

        const displayImage = getDisplayImage(p);
        const fallbackImage = createFallbackSVG(p.name, p.category);
        const imageUrl = displayImage || fallbackImage;
        const useFallbackClass = !displayImage;
        const shopUrl = getDisplayAffiliateLink(p);
        const safeName = sanitizeText(p.name);
        const safeDescription = sanitizeText(p.description || '');
        const safeCategory = sanitizeText(p.category || 'All');
        const discount = getDisplayDiscount(p);
        const score = getDisplayScore(p);
        const dealLabel = getDealLabel(p);

        const hasOriginalPrice = p.original_price !== null && p.original_price !== undefined && p.original_price !== '';
        const hasPrice = p.price !== null && p.price !== undefined && p.price !== '';

        const originalPriceHtml = hasOriginalPrice
          ? `<span class="old-price">${formatPrice(p.original_price)}</span>`
          : '';

        const priceHtml = hasPrice
          ? `<span class="new-price">${formatPrice(p.price)}</span>`
          : `<span class="new-price" style="font-size:34px;">Check price</span>`;

        card.innerHTML = `
          <img
            src="${imageUrl}"
            alt="${safeName}"
            class="deal-bg ${useFallbackClass ? 'fallback' : ''}"
            loading="${i === 0 ? 'eager' : 'lazy'}"
            decoding="async"
            fetchpriority="${i === 0 ? 'high' : 'low'}"
            onerror="this.onerror=null; this.src='${fallbackImage}'; this.classList.add('fallback');"
          >

          <div class="deal-overlay"></div>

          <div class="top-row">
            <div class="top-left">
              ${discount > 0
                ? `<span class="badge badge-hot">-${discount}% Off</span>`
                : `<span class="badge badge-good">Hot Deal</span>`
              }
              <span class="badge">${safeCategory}</span>
            </div>
            <span class="badge">Score ${score}</span>
          </div>

          <div class="content">
            <h2 class="product-title">${safeName}</h2>

            <div class="signals">
              <span class="signal-pill">${sanitizeText(dealLabel)}</span>
              ${hasPrice ? `<span class="signal-pill">💵 ${formatPrice(p.price)}</span>` : ''}
              ${discount > 0 ? `<span class="signal-pill">📉 ${discount}% off</span>` : ''}
            </div>

            <p class="product-desc">${safeDescription || 'Trending Amazon product deal. Tap below to check the latest price and availability.'}</p>

            <div class="bottom-row">
              <div class="price-box">
                ${originalPriceHtml}
                ${priceHtml}
              </div>

              <a
                href="${shopUrl}"
                target="_blank"
                rel="nofollow sponsored noopener noreferrer"
                class="cta-btn"
                aria-label="Get this deal now on Amazon"
              >
                🔥 Get Deal Now
              </a>
            </div>
          </div>
        `;

        container.appendChild(card);

        if (i === 0) {
          initDrag(card);
        }
      });
    }

    function showLikeBurst() {
      const burst = document.getElementById('like-burst');
      burst.classList.remove('show');
      void burst.offsetWidth;
      burst.classList.add('show');
    }

    function getCurrentProduct() {
      return products[currentIndex] || null;
    }

    async function shareCurrentDeal() {
      const currentProduct = getCurrentProduct();
      if (!currentProduct) return;

      const url = getDisplayAffiliateLink(currentProduct);
      const title = currentProduct.name || 'Trending deal';
      const text = `🔥 Found this great deal on TrendPulse: ${title}`;

      try {
        if (navigator.share) {
          await navigator.share({ title, text, url });
        } else {
          await navigator.clipboard.writeText(url);
          alert('Deal link copied to clipboard');
        }
      } catch (err) {
        console.error('Share failed:', err);
      }
    }

    function initDrag(el) {
      let startX = 0;
      let moveX = 0;
      let isDragging = false;

      const onTouchStart = (e) => {
        if (isAnimating || isLoading) return;
        startX = e.touches[0].clientX;
        moveX = 0;
        isDragging = true;
        el.style.transition = 'none';
      };

      const onTouchMove = (e) => {
        if (!isDragging || isAnimating || isLoading) return;
        moveX = e.touches[0].clientX - startX;
        const rotation = moveX / 16;
        el.style.transform = `translate3d(${moveX}px,0,0) rotate(${rotation}deg)`;
      };

      const onTouchEnd = () => {
        if (!isDragging || isAnimating || isLoading) return;
        isDragging = false;
        el.style.transition = 'transform .28s ease';

        if (Math.abs(moveX) > 105) {
          const direction = moveX > 0 ? 'right' : 'left';
          swipeCurrent(direction);
        } else {
          el.style.transform = 'translate3d(0,0,0) rotate(0deg)';
        }
      };

      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: true });
      el.addEventListener('touchend', onTouchEnd, { passive: true });
    }

    function swipeCurrent(direction) {
      if (isAnimating || isLoading) return;

      const currentProduct = getCurrentProduct();
      const card = document.querySelector('.deal-card');
      if (!card || !currentProduct) return;

      isAnimating = true;
      vibrate(direction === 'right' ? 50 : 28);

      if (direction === 'left') {
        recordSkip(currentProduct.id);
      }

      if (direction === 'right') {
        showLikeBurst();
        const link = getDisplayAffiliateLink(currentProduct);
        setTimeout(() => {
          if (link && link !== '#') {
            window.open(link, '_blank', 'noopener,noreferrer');
          }
        }, 120);
      }

      card.style.transition = 'transform .26s ease, opacity .22s ease';
      card.style.opacity = '0.88';
      card.style.transform = `translate3d(${direction === 'right' ? 1100 : -1100}px,0,0) rotate(${direction === 'right' ? 16 : -16}deg)`;

      setTimeout(() => {
        currentIndex++;
        isAnimating = false;
        renderStack();
      }, 220);
    }

    window.forceSwipe = function(dir) {
      swipeCurrent(dir);
    };

    window.reloadDeals = function() {
      load();
    };

    load();
  </script>
</body>
</html>
