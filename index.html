<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; overflow: hidden; touch-action: none; }
        .card-stack { position: relative; width: 100%; height: 70vh; perspective: 1000px; }
        .card { 
            position: absolute; inset: 0; background: #111; border-radius: 32px;
            border: 1px solid #222; overflow: hidden;
            will-change: transform; transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.15, 0.3, 0.25, 1);
        }
        /* Overlays Like/Nope */
        .stamp { position: absolute; top: 40px; padding: 10px 20px; border: 4px solid; border-radius: 10px; text-transform: uppercase; font-size: 2rem; font-weight: 900; opacity: 0; transform: rotate(-20deg); pointer-events: none; }
        .stamp-like { left: 40px; border-color: #22c55e; color: #22c55e; transform: rotate(-15deg); }
        .stamp-nope { right: 40px; border-color: #ef4444; color: #ef4444; transform: rotate(15deg); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen px-6">

    <header class="mb-8 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">TrendPulse</h1>
        <div id="counter" class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">Chargement des pépites...</div>
    </header>

    <div id="app" class="card-stack max-w-sm">
        </div>

    <footer class="mt-10 flex items-center gap-12">
        <button onclick="forceSwipe('left')" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-red-500 shadow-xl">✕</button>
        <button onclick="forceSwipe('right')" class="w-16 h-16 rounded-full bg-white flex items-center justify-center text-black shadow-xl">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
    </footer>

    <script>
        const supabaseUrl = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let products = [];
        let currentIndex = 0;

        async function load() {
            const { data } = await sb.from('products').select('*').order('id', { ascending: false });
            products = data;
            renderStack();
        }

        function renderStack() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            // On ne rend que les 3 prochaines cartes pour la fluidité
            products.slice(currentIndex, currentIndex + 3).forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.zIndex = 10 - i;
                card.style.transform = `scale(${1 - i * 0.05}) translateY(${i * 20}px)`;
                
                // Utilisation de l'image dynamique Amazon si ASIN présent
                const img = p.image_url || `https://ws-eu.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&MarketPlace=FR&Operation=GetImage&ASIN=${p.asin}&Service=Amazon&TemplateId=LargeImage`;

                card.innerHTML = `
                    <div class="stamp stamp-like">Like</div>
                    <div class="stamp stamp-nope">Pass</div>
                    <img src="${img}" class="w-full h-2/3 object-cover">
                    <div class="p-6 bg-gradient-to-t from-black h-full">
                        <h2 class="text-xl font-black uppercase">${p.name}</h2>
                        <p class="text-zinc-400 text-sm mt-2">${p.description}</p>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-2xl font-light">${p.price}€</span>
                            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded-full font-bold">TRENDING</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if(i === 0) initDrag(card);
            });
            document.getElementById('counter').innerText = `${products.length - currentIndex} pépites restantes`;
        }

        function initDrag(el) {
            let startX, moveX, isDragging = false;
            const likeStamp = el.querySelector('.stamp-like');
            const nopeStamp = el.querySelector('.stamp-nope');

            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                el.style.transition = 'none';
            });

            el.addEventListener('touchmove', (e) => {
                if(!isDragging) return;
                moveX = e.touches[0].clientX - startX;
                let rotation = moveX / 15;
                el.style.transform = `translate3d(${moveX}px, 0, 0) rotate(${rotation}deg)`;
                
                // Feedback visuel (Stamps)
                likeStamp.style.opacity = moveX > 50 ? (moveX - 50) / 100 : 0;
                nopeStamp.style.opacity = moveX < -50 ? (Math.abs(moveX) - 50) / 100 : 0;
            });

            el.addEventListener('touchend', () => {
                isDragging = false;
                el.style.transition = 'all 0.4s ease';
                if (Math.abs(moveX) > 120) {
                    const direction = moveX > 0 ? 1 : -1;
                    el.style.transform = `translate3d(${direction * 1000}px, 0, 0) rotate(${direction * 40}deg)`;
                    setTimeout(() => {
                        if(direction === 1) window.open(products[currentIndex].affiliate_link, '_blank');
                        currentIndex++;
                        renderStack();
                    }, 200);
                } else {
                    el.style.transform = `translate3d(0,0,0) scale(1)`;
                    likeStamp.style.opacity = 0;
                    nopeStamp.style.opacity = 0;
                }
            });
        }

        // Boutons de secours
        window.forceSwipe = (dir) => {
            const card = document.querySelector('.card');
            if(!card) return;
            const move = dir === 'right' ? 1000 : -1000;
            card.style.transition = 'all 0.5s ease';
            card.style.transform = `translate3d(${move}px, 0, 0) rotate(${dir === 'right' ? 40 : -40}deg)`;
            setTimeout(() => {
                if(dir === 'right') window.open(products[currentIndex].affiliate_link, '_blank');
                currentIndex++;
                renderStack();
            }, 300);
        };

        load();
    </script>
</body>
</html>
