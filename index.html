<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse | Smart Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: none; }
        .card-stack { position: relative; width: 100%; height: 65vh; perspective: 1000px; }
        .card { position: absolute; inset: 0; background: #111; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; will-change: transform; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .card-info { background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%); position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 24px 24px; }
        .promo-badge { background: #ef4444; color: white; padding: 4px 12px; border-radius: 10px; font-weight: 900; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen py-10 px-6">

    <header class="w-full flex justify-between items-center px-2">
        <div>
            <h1 class="text-xl font-extrabold tracking-tighter italic leading-none">TRENDPULSE</h1>
            <p id="counter" class="text-[9px] text-zinc-500 font-bold tracking-[0.2em] uppercase mt-1">Searching Deals...</p>
        </div>
        <div class="flex gap-2">
            <div id="save-tag" class="hidden promo-badge animate-bounce">TOP PROMO</div>
        </div>
    </header>

    <div id="app" class="card-stack max-w-sm"></div>

    <footer class="w-full max-w-xs flex justify-around items-center mb-4">
        <button onclick="forceSwipe('left')" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400">✕</button>
        <button onclick="forceSwipe('right')" class="w-20 h-20 rounded-full bg-white flex items-center justify-center text-black shadow-xl">
            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
        <button onclick="filterTop()" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-yellow-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
    </footer>

    <script>
        const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Ta clé
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let products = [];
        let currentIndex = 0;

        async function load(filter = '') {
            let query = sb.from('products').select('*');
            if(filter === 'top') query = query.gt('likes', 5).order('likes', {ascending: false});
            else query = query.order('id', {ascending: false});
            
            const { data } = await query;
            products = data;
            renderStack();
        }

        function renderStack() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            products.slice(currentIndex, currentIndex + 2).forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.zIndex = 10 - i;
                card.style.transform = `scale(${1 - i * 0.08}) translateY(${i * 30}px)`;
                
                // Calcul de l'économie
                let discountHtml = '';
                if (p.original_price > p.price) {
                    const pct = Math.round(((p.original_price - p.price) / p.original_price) * 100);
                    discountHtml = `<div class="promo-badge">-${pct}% OFF</div>`;
                }

                const img = p.image_url || `https://ws-eu.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&MarketPlace=FR&Operation=GetImage&ASIN=${p.asin}&Service=Amazon&TemplateId=LargeImage`;

                card.innerHTML = `
                    <img src="${img}" class="w-full h-full object-cover">
                    <div class="card-info">
                        <div class="flex justify-between items-center mb-4">
                            ${discountHtml}
                            <span class="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">${p.tagline || 'Trending'}</span>
                        </div>
                        <h2 class="text-2xl font-black uppercase leading-tight tracking-tighter mb-6">${p.name}</h2>
                        <div class="flex justify-between items-center">
                            <div class="flex flex-col">
                                ${p.original_price ? `<span class="text-xs text-zinc-500 line-through">${p.original_price}€</span>` : ''}
                                <span class="text-3xl font-black">${p.price}€</span>
                            </div>
                            <a href="${p.affiliate_link}" target="_blank" class="bg-white text-black px-6 py-3 rounded-2xl font-extrabold text-sm uppercase">Shop Now</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if(i === 0) initDrag(card);
            });
            document.getElementById('counter').innerText = `${products.length - currentIndex} deals found`;
        }

        async function recordVote(id, type) {
            // Incrémente likes ou nopes dans Supabase
            const p = products[currentIndex];
            const newValue = (p[type] || 0) + 1;
            await sb.from('products').update({ [type]: newValue }).eq('id', id);
        }

        function initDrag(el) {
            let startX, moveX = 0, isDragging = false;
            el.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; el.style.transition = 'none'; });
            el.addEventListener('touchmove', (e) => { if(!isDragging) return; moveX = e.touches[0].clientX - startX; el.style.transform = `translate3d(${moveX}px, 0, 0) rotate(${moveX/20}deg)`; });
            el.addEventListener('touchend', () => {
                isDragging = false;
                el.style.transition = 'all 0.5s ease';
                if (Math.abs(moveX) > 120) {
                    const type = moveX > 0 ? 'likes' : 'nopes';
                    recordVote(products[currentIndex].id, type);
                    el.style.transform = `translate3d(${moveX > 0 ? 1000 : -1000}px, 0, 0)`;
                    setTimeout(() => { currentIndex++; renderStack(); }, 200);
                } else { el.style.transform = `translate3d(0,0,0)`; }
                moveX = 0;
            });
        }

        window.forceSwipe = (dir) => {
            const type = dir === 'right' ? 'likes' : 'nopes';
            recordVote(products[currentIndex].id, type);
            // ... animation de swipe identique au code précédent ...
        };

        function filterTop() {
            currentIndex = 0;
            load('top');
        }

        load();
    </script>
</body>
</html>
