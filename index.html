<html lang="en">
<head>

  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"WebSite",
    "name":"TrendPulse",
    "url":"https://trend-pulse.shop/",
    "description":"Trending Amazon deals and popular discounted products for shoppers in the United States.",
    "potentialAction":{
      "@type":"SearchAction",
      "target":"https://trend-pulse.shop/?q={search_term_string}",
      "query-input":"required name=search_term_string"
    }
  }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg: #050505;
      --card: #0f1014;
      --muted: #a1a1aa;
      --line: rgba(255,255,255,.08);
      --pill: #171923;
      --blue: #2563eb;
      --white: #ffffff;
      --red: #ef4444;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(37,99,235,.12), transparent 26%),
        linear-gradient(180deg, #050505 0%, #07080b 100%);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page-shell {
      min-height: 100vh;
      padding:
        max(18px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom))
        18px;
    }

    .glass {
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--line);
      color: #d4d4d8;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-title {
      font-size: clamp(32px, 6vw, 52px);
      line-height: .94;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -.05em;
    }

    .stack {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 68vh;
      margin: 0 auto;
      perspective: 1400px;
    }

    .deal-card {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 34px;
      background: linear-gradient(180deg, #11131a 0%, #090a0f 100%);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        0 30px 80px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.04);
      will-change: transform, opacity;
      transition: transform .42s cubic-bezier(.22,1,.36,1), opacity .28s ease;
    }

    .deal-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #fff;
    }

    .deal-bg.fallback {
      object-fit: contain;
      padding: 28px;
      background:
        radial-gradient(circle at center, rgba(37,99,235,.16), transparent 35%),
        linear-gradient(180deg, #161922 0%, #0d0f15 100%);
    }

    .deal-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.20) 36%, rgba(0,0,0,.88) 100%);
      pointer-events: none;
    }

    .top-row {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 2;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .pill-hot {
      background: linear-gradient(135deg, #ff4d4d, #ff7a18);
      color: white;
      border: none;
      box-shadow: 0 8px 20px rgba(255,95,31,.28);
    }

    .content {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      z-index: 2;
    }

    .product-title {
      font-size: clamp(28px, 7vw, 42px);
      line-height: .95;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -.05em;
      margin: 0 0 10px;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .product-desc {
      color: #d4d4d8;
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 18px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .bottom-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .price-box {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .old-price {
      color: #71717a;
      font-size: 14px;
      text-decoration: line-through;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .new-price {
      font-size: clamp(30px, 8vw, 48px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 136px;
      padding: 16px 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, #3275ff 0%, #1d4ed8 100%);
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: 0 16px 28px rgba(37,99,235,.28);
    }

    .cta-btn:active {
      transform: translateY(1px);
    }

    .controls {
      width: 100%;
      max-width: 360px;
      margin: 22px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .action-btn {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #171922 0%, #0f1118 100%);
      color: #8b8b98;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 14px 26px rgba(0,0,0,.28);
    }

    .action-btn-main {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(180deg, #ffffff 0%, #ededed 100%);
      color: #000;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 45px rgba(255,255,255,.16);
    }

    .status-box {
      width: 100%;
      max-width: 420px;
      height: 68vh;
      margin: 0 auto;
      border-radius: 34px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #11131a 0%, #090a0f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,.42);
    }

    .status-title {
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 8px;
      letter-spacing: -.03em;
    }

    .status-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 420px) {
      .page-shell {
        padding-left: 14px;
        padding-right: 14px;
      }

      .stack,
      .status-box {
        height: 66vh;
      }

      .content {
        left: 18px;
        right: 18px;
        bottom: 18px;
      }

      .cta-btn {
        min-width: 122px;
        padding: 14px 16px;
      }
    }
  </style>

    import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@1/dist/index.mjs';
    inject();
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="w-full max-w-[980px] mx-auto mb-5">
      <div class="flex items-start justify-between gap-3 mb-3">
        <div>
          <p class="hero-title m-0">TRENDPULSE</p>
          <div class="mt-2 flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
            <span class="text-[12px] uppercase tracking-[0.18em] text-zinc-400 font-extrabold">Live Amazon Deals</span>
          </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <button id="refresh-btn" onclick="reloadDeals()" class="badge" aria-label="Refresh deals">Refresh</button>
          <div id="deal-count" class="badge">0 Deals</div>
        </div>
      </div>

      <p class="m-0 text-sm text-zinc-400 max-w-[680px]">
        Discover trending Amazon bargains, popular discounts, and fast-moving product deals for shoppers in the United States.
      </p>
    </header>

    <main class="w-full">
      <h1 class="visually-hidden">TrendPulse trending Amazon deals</h1>
      <section aria-label="Trending Amazon deals">
        <div id="app" class="stack"></div>
      </section>
    </main>

    <footer class="controls" aria-label="Deal actions">
      <button id="btn-nope" onclick="forceSwipe('left')" class="action-btn" aria-label="Skip this deal">✕</button>

      <button id="btn-like" onclick="forceSwipe('right')" class="action-btn-main" aria-label="Open this deal">
        <svg class="w-11 h-11" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>

      <button onclick="clearNopesAndReload()" class="action-btn" aria-label="Reset skipped deals">↺</button>
    </footer>
  </div>

  <script>
    const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';

    const sb = supabase.createClient(SB_URL, SB_KEY);

    let products = [];
    let currentIndex = 0;
    let isAnimating = false;
    let isLoading = false;

    function getSkippedIds() {
      try {
        return JSON.parse(localStorage.getItem('tp_nopes') || '[]');
      } catch {
        return [];
      }
    }

    function setSkippedIds(ids) {
      localStorage.setItem('tp_nopes', JSON.stringify(ids));
    }

    function recordSkip(id) {
      const skipped = getSkippedIds();
      if (!skipped.includes(id)) {
        skipped.push(id);
        setSkippedIds(skipped);
      }
    }

    function clearNopesAndReload() {
      localStorage.removeItem('tp_nopes');
      load();
    }

    function sanitizeText(text) {
      return String(text || '')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === '') return '';
      const num = Number(value);
      if (Number.isNaN(num)) return '';
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: num % 1 === 0 ? 0 : 2
      }).format(num);
    }

    function getDisplayImage(product) {
      if (product.image_url && String(product.image_url).trim() !== '') {
        return product.image_url;
      }
      return '';
    }

    function getDisplayAffiliateLink(product) {
      if (product.affiliate_link && String(product.affiliate_link).trim() !== '') {
        return product.affiliate_link;
      }
      if (product.asin) {
        return `https://www.amazon.com/dp/${product.asin}`;
      }
      return '#';
    }

    function getDisplayDiscount(product) {
      const dp = Number(product.discount_percent || 0);
      if (Number.isFinite(dp) && dp > 0) return Math.round(dp);

      const price = Number(product.price);
      const original = Number(product.original_price);

      if (Number.isFinite(price) && Number.isFinite(original) && original > price && original > 0) {
        return Math.round(((original - price) / original) * 100);
      }

      return 0;
    }

    function getDisplayScore(product) {
      const score = Number(product.score || 0);
      if (!Number.isFinite(score)) return 0;
      return Math.round(score);
    }

    function updateDealCount() {
      const remaining = Math.max(products.length - currentIndex, 0);
      document.getElementById('deal-count').innerText = `${remaining} Deals`;
    }

    function setButtonsDisabled(disabled) {
      document.getElementById('btn-nope').disabled = disabled;
      document.getElementById('btn-like').disabled = disabled;
      document.getElementById('refresh-btn').disabled = disabled;
    }

    function renderState(title, text, isError = false) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="status-box">
          <div>
            <h2 class="status-title ${isError ? 'text-red-400' : 'text-white'}">${sanitizeText(title)}</h2>
            <p class="status-text">${sanitizeText(text)}</p>
          </div>
        </div>
      `;
      updateDealCount();
    }

    function createFallbackSVG(name, category) {
      const safeName = sanitizeText(name || 'Trending Deal');
      const safeCategory = sanitizeText(category || 'Amazon Deal');

      return `data:image/svg+xml;utf8,
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="%23121825"/>
            <stop offset="100%" stop-color="%23090b11"/>
          </linearGradient>
        </defs>
        <rect width="1200" height="1600" fill="url(%23g)"/>
        <circle cx="600" cy="440" r="220" fill="%232563eb" opacity="0.12"/>
        <text x="600" y="320" text-anchor="middle" fill="white" font-size="70" font-family="Arial, sans-serif" font-weight="800">TrendPulse</text>
        <text x="600" y="410" text-anchor="middle" fill="%23a1a1aa" font-size="34" font-family="Arial, sans-serif">${safeCategory}</text>
        <text x="600" y="760" text-anchor="middle" fill="white" font-size="68" font-family="Arial, sans-serif" font-weight="900">No product image</text>
        <text x="600" y="860" text-anchor="middle" fill="%23cbd5e1" font-size="34" font-family="Arial, sans-serif">Tap to view the deal on Amazon</text>
        <foreignObject x="120" y="980" width="960" height="360">
          <div xmlns="http://www.w3.org/1999/xhtml" style="color:white;font-size:52px;line-height:1.1;font-family:Arial,sans-serif;font-weight:900;text-align:center;">
            ${safeName}
          </div>
        </foreignObject>
      </svg>`;
    }

    async function load() {
      if (isLoading) return;

      isLoading = true;
      setButtonsDisabled(true);
      renderState('Loading deals...', 'Fetching the latest trending Amazon offers.');

      try {
        const skippedIds = getSkippedIds();

        const { data, error } = await sb
          .from('products')
          .select(`
            id,
            name,
            tagline,
            description,
            price,
            image_url,
            affiliate_link,
            asin,
            original_price,
            likes,
            nopes,
            category,
            discount_percent,
            score,
            created_at,
            updated_at,
            is_active
          `)
          .eq('is_active', true)
          .not('asin', 'is', null)
          .order('score', { ascending: false })
          .order('discount_percent', { ascending: false })
          .limit(60);

        if (error) {
          console.error('Supabase error:', error);
          renderState('Unable to load deals', error.message || 'Please try again in a moment.', true);
          return;
        }

        products = (data || []).filter(item => {
          if (!item || !item.id || !item.name || !item.asin) return false;
          if (skippedIds.includes(item.id)) return false;
          return true;
        });

        currentIndex = 0;
        updateDealCount();

        if (!products.length) {
          renderState('No deals available right now', 'Please check back later or reset your skipped deals.');
          return;
        }

        renderStack();
      } catch (err) {
        console.error(err);
        renderState('Unexpected error', err.message || 'Something went wrong.', true);
      } finally {
        isLoading = false;
        setButtonsDisabled(false);
      }
    }

    function renderStack() {
      const container = document.getElementById('app');
      container.innerHTML = '';

      const remaining = products.slice(currentIndex, currentIndex + 2);
      updateDealCount();

      if (!remaining.length) {
        renderState('You are all caught up', 'Refresh to load new deals or reset skipped items.');
        return;
      }

      remaining.forEach((p, i) => {
        const card = document.createElement('article');
        card.className = 'deal-card';
        card.style.zIndex = 10 - i;
        card.style.transform = `scale(${1 - i * 0.05}) translateY(${i * 16}px)`;

        const imageUrl = getDisplayImage(p) || createFallbackSVG(p.name, p.category);
        const useFallbackClass = !getDisplayImage(p);
        const shopUrl = getDisplayAffiliateLink(p);
        const safeName = sanitizeText(p.name);
        const safeDescription = sanitizeText(p.description || '');
        const safeCategory = sanitizeText(p.category || 'All');
        const discount = getDisplayDiscount(p);
        const score = getDisplayScore(p);

        const hasOriginalPrice = p.original_price !== null && p.original_price !== undefined && p.original_price !== '';
        const hasPrice = p.price !== null && p.price !== undefined && p.price !== '';

        const originalPriceHtml = hasOriginalPrice
          ? `<span class="old-price">${formatPrice(p.original_price)}</span>`
          : '';

        const priceHtml = hasPrice
          ? `<span class="new-price">${formatPrice(p.price)}</span>`
          : `<span class="new-price" style="font-size:34px;">Check price</span>`;

        card.innerHTML = `
          <img
            src="${imageUrl}"
            alt="${safeName}"
            class="deal-bg ${useFallbackClass ? 'fallback' : ''}"
            loading="eager"
            decoding="async"
            fetchpriority="high"
            onerror="this.onerror=null; this.src='${createFallbackSVG(p.name, p.category)}'; this.classList.add('fallback');"
          >

          <div class="deal-overlay"></div>

          <div class="top-row">
            <div class="top-left">
              ${discount > 0
                ? `<span class="badge pill-hot">-${discount}% Off</span>`
                : `<span class="badge">Hot Deal</span>`
              }
              <span class="badge">${safeCategory}</span>
            </div>
            <span class="badge">Score ${score}</span>
          </div>

          <div class="content">
            <h2 class="product-title">${safeName}</h2>
            <p class="product-desc">${safeDescription || 'Trending Amazon product deal. Tap to check the latest price and availability.'}</p>

            <div class="bottom-row">
              <div class="price-box">
                ${originalPriceHtml}
                ${priceHtml}
              </div>

              <a
                href="${shopUrl}"
                target="_blank"
                rel="nofollow sponsored noopener noreferrer"
                class="cta-btn"
                aria-label="Shop ${safeName} on Amazon"
              >
                Shop Now
              </a>
            </div>
          </div>
        `;

        container.appendChild(card);

        if (i === 0) {
          initDrag(card);
        }
      });
    }

    function initDrag(el) {
      let startX = 0;
      let moveX = 0;
      let isDragging = false;

      const onTouchStart = (e) => {
        if (isAnimating || isLoading) return;
        startX = e.touches[0].clientX;
        moveX = 0;
        isDragging = true;
        el.style.transition = 'none';
      };

      const onTouchMove = (e) => {
        if (!isDragging || isAnimating || isLoading) return;
        moveX = e.touches[0].clientX - startX;
        const rotation = moveX / 18;
        el.style.transform = `translate3d(${moveX}px,0,0) rotate(${rotation}deg)`;
      };

      const onTouchEnd = () => {
        if (!isDragging || isAnimating || isLoading) return;
        isDragging = false;
        el.style.transition = 'transform .35s ease';

        if (Math.abs(moveX) > 120) {
          const direction = moveX > 0 ? 'right' : 'left';
          swipeCurrent(direction);
        } else {
          el.style.transform = 'translate3d(0,0,0) rotate(0deg)';
        }
      };

      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: true });
      el.addEventListener('touchend', onTouchEnd, { passive: true });
    }

    function swipeCurrent(direction) {
      if (isAnimating || isLoading) return;

      const currentProduct = products[currentIndex];
      const card = document.querySelector('.deal-card');
      if (!card || !currentProduct) return;

      isAnimating = true;

      if (direction === 'left') {
        recordSkip(currentProduct.id);
      }

      if (direction === 'right') {
        const link = getDisplayAffiliateLink(currentProduct);
        if (link && link !== '#') {
          window.open(link, '_blank', 'noopener,noreferrer');
        }
      }

      card.style.transition = 'transform .35s ease, opacity .25s ease';
      card.style.opacity = '0.9';
      card.style.transform = `translate3d(${direction === 'right' ? 1000 : -1000}px,0,0) rotate(${direction === 'right' ? 18 : -18}deg)`;

      setTimeout(() => {
        currentIndex++;
        isAnimating = false;
        renderStack();
      }, 250);
    }

    window.forceSwipe = function(dir) {
      swipeCurrent(dir);
    };

    window.reloadDeals = function() {
      load();
    };

    load();
  </script>
</body>
</html>
