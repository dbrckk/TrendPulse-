<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }

        .card-stack { position: relative; width: 100%; height: 65vh; perspective: 1000px; }
        
        .card { 
            position: absolute; inset: 0; background: #111; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            will-change: transform; transform-origin: center center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .card-info {
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%);
            position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 24px 24px;
        }

        .btn-action {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-action:active { transform: scale(0.85); }

        .stamp { 
            position: absolute; top: 15%; padding: 10px 25px; 
            border: 5px solid; border-radius: 15px; 
            text-transform: uppercase; font-size: 2.5rem; font-weight: 800; 
            opacity: 0; z-index: 100; pointer-events: none; 
        }
        .stamp-like { left: 30px; border-color: #22c55e; color: #22c55e; transform: rotate(-15deg); }
        .stamp-nope { right: 30px; border-color: #ef4444; color: #ef4444; transform: rotate(15deg); }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen py-10 px-6">

    <header class="w-full flex justify-between items-center px-2">
        <div>
            <h1 class="text-xl font-extrabold tracking-tighter italic leading-none">TRENDPULSE</h1>
            <p id="counter" class="text-[9px] text-zinc-500 font-bold tracking-[0.2em] uppercase mt-1">Checking stock...</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center">
            <span class="text-xs">🔥</span>
        </div>
    </header>

    <div id="app" class="card-stack max-w-sm">
        </div>

    <footer class="w-full max-w-xs flex justify-around items-center mb-4">
        <button onclick="forceSwipe('left')" class="btn-action w-16 h-16 rounded-full bg-zinc-900/80 backdrop-blur-md border border-zinc-800 flex items-center justify-center text-zinc-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        
        <button onclick="forceSwipe('right')" class="btn-action w-20 h-20 rounded-full bg-white flex items-center justify-center text-black shadow-[0_0_30px_rgba(255,255,255,0.3)]">
            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>

        <div class="w-16 h-16 rounded-full bg-zinc-900/80 backdrop-blur-md border border-zinc-800 flex items-center justify-center text-yellow-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cm9meWZobWFiaGxxYnVjamRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjU1NjcsImV4cCI6MjA5MDMwMTU2N30.3BgysZzrE0eYMiyT4TvvupSZJpXOGq40V5YzA78rvhs';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let products = [];
        let currentIndex = 0;

        async function load() {
            const { data } = await sb.from('products').select('*').order('id', { ascending: false });
            products = data;
            renderStack();
        }

        function renderStack() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            products.slice(currentIndex, currentIndex + 2).forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.zIndex = 10 - i;
                card.style.transform = `scale(${1 - i * 0.08}) translateY(${i * 30}px)`;
                
                const img = p.image_url || `https://ws-eu.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&MarketPlace=FR&Operation=GetImage&ASIN=${p.asin}&Service=Amazon&TemplateId=LargeImage`;

                card.innerHTML = `
                    <div class="stamp stamp-like">ADORE</div>
                    <div class="stamp stamp-nope">PAS TOP</div>
                    <img src="${img}" class="w-full h-full object-cover">
                    <div class="card-info">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded-md tracking-tighter uppercase">Viral Now</span>
                            <span class="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">${p.tagline || 'Tech'}</span>
                        </div>
                        <h2 class="text-2xl font-black uppercase leading-tight tracking-tighter mb-1">${p.name}</h2>
                        <p class="text-zinc-300 text-sm line-clamp-2 mb-6 font-medium opacity-80">${p.description}</p>
                        <div class="flex justify-between items-end">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-zinc-500 font-bold uppercase">Meilleur prix</span>
                                <span class="text-3xl font-black tracking-tighter">${p.price}€</span>
                            </div>
                            <a href="${p.affiliate_link}" target="_blank" class="bg-white text-black px-6 py-3 rounded-2xl font-extrabold text-sm uppercase tracking-tighter shadow-xl">Shop Link</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if(i === 0) initDrag(card);
            });
            document.getElementById('counter').innerText = `${products.length - currentIndex} objets trouvés`;
        }

        function initDrag(el) {
            let startX, startY, moveX, isDragging = false;
            const likeStamp = el.querySelector('.stamp-like');
            const nopeStamp = el.querySelector('.stamp-nope');

            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isDragging = true;
                el.style.transition = 'none';
            });

            el.addEventListener('touchmove', (e) => {
                if(!isDragging) return;
                moveX = e.touches[0].clientX - startX;
                let moveY = e.touches[0].clientY - startY;
                let rotation = moveX / 15;
                el.style.transform = `translate3d(${moveX}px, ${moveY/2}px, 0) rotate(${rotation}deg)`;
                
                likeStamp.style.opacity = moveX > 50 ? (moveX - 50) / 100 : 0;
                nopeStamp.style.opacity = moveX < -50 ? (Math.abs(moveX) - 50) / 100 : 0;
            });

            el.addEventListener('touchend', () => {
                isDragging = false;
                el.style.transition = 'all 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
                if (Math.abs(moveX) > 130) {
                    const direction = moveX > 0 ? 1 : -1;
                    el.style.transform = `translate3d(${direction * 1000}px, 0, 0) rotate(${direction * 40}deg)`;
                    setTimeout(() => {
                        if(direction === 1) window.open(products[currentIndex].affiliate_link, '_blank');
                        currentIndex++;
                        renderStack();
                    }, 200);
                } else {
                    el.style.transform = `translate3d(0,0,0) scale(1)`;
                    likeStamp.style.opacity = 0;
                    nopeStamp.style.opacity = 0;
                }
                moveX = 0;
            });
        }

        window.forceSwipe = (dir) => {
            const card = document.querySelector('.card');
            if(!card) return;
            const move = dir === 'right' ? 1000 : -1000;
            card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            card.style.transform = `translate3d(${move}px, 0, 0) rotate(${dir === 'right' ? 40 : -40}deg)`;
            setTimeout(() => {
                if(dir === 'right') window.open(products[currentIndex].affiliate_link, '_blank');
                currentIndex++;
                renderStack();
            }, 300);
        };

        load();
    </script>
</body>
    </html>
