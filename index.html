<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrendPulse | Best Deals Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: none; }
        .card-stack { position: relative; width: 100%; height: 70vh; perspective: 1200px; }
        .card { position: absolute; inset: 0; background: #0a0a0a; border-radius: 38px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; will-change: transform; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .card-overlay { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%); position: absolute; inset: 0; pointer-events: none; }
        .promo-pill { background: #ff3b30; color: white; padding: 6px 12px; border-radius: 12px; font-weight: 900; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4); }
    </style>
</head>
<body class="flex flex-col h-screen py-6 px-5">

    <header class="w-full flex justify-between items-center mb-4">
        <div class="flex flex-col">
            <h1 class="text-2xl font-[900] tracking-tighter italic">TRENDPULSE</h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Live Amazon Deals</span>
            </div>
        </div>
        <div id="deal-count" class="bg-zinc-900 border border-zinc-800 px-3 py-1 rounded-full text-[10px] font-bold text-zinc-400">0 DEALS</div>
    </header>

    <div id="app" class="card-stack max-w-sm mx-auto">
        </div>

    <footer class="w-full max-w-xs mx-auto flex justify-around items-center mt-6 mb-4">
        <button onclick="forceSwipe('left')" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-500">✕</button>
        <button onclick="forceSwipe('right')" class="w-20 h-20 rounded-full bg-white flex items-center justify-center text-black shadow-2xl">
            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
        <div class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-yellow-500 opacity-30">🔥</div>
    </footer>

    <script>
        const SB_URL = 'https://hyrofyfhmabhlqbucjdp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Ta clé Anon
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let products = [];
        let currentIndex = 0;

        // Charger les articles dislikés depuis la mémoire du tel
        function getDislikedIds() {
            return JSON.parse(localStorage.getItem('tp_nopes') || '[]');
        }

        async function load() {
            const dislikedIds = getDislikedIds();
            
            // On récupère tout ce qui a plus de 10% de réduction
            const { data } = await sb.from('products')
                .select('*')
                .gt('discount_percent', 10)
                .order('discount_percent', { ascending: false });

            // On filtre pour enlever ceux déjà "nopes" par cet utilisateur
            products = data.filter(p => !dislikedIds.includes(p.id));
            
            document.getElementById('deal-count').innerText = `${products.length} DEALS`;
            renderStack();
        }

        function renderStack() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            products.slice(currentIndex, currentIndex + 2).forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.zIndex = 10 - i;
                card.style.transform = `scale(${1 - i * 0.08}) translateY(${i * 25}px)`;
                
                const img = `https://ws-eu.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&MarketPlace=FR&Operation=GetImage&ASIN=${p.asin}&Service=Amazon&TemplateId=LargeImage`;

                card.innerHTML = `
                    <img src="${img}" class="w-full h-full object-cover p-12 bg-white">
                    <div class="card-overlay"></div>
                    <div class="absolute bottom-0 p-8 w-full">
                        <div class="flex justify-between items-center mb-4">
                            <span class="promo-pill">-${Math.round(p.discount_percent)}% OFF</span>
                        </div>
                        <h2 class="text-2xl font-extrabold leading-tight mb-4 line-clamp-2 uppercase italic">${p.name}</h2>
                        <div class="flex justify-between items-end">
                            <div class="flex flex-col">
                                <span class="text-xs text-zinc-500 line-through">${p.original_price || p.price + 20}€</span>
                                <span class="text-4xl font-black">${p.price}€</span>
                            </div>
                            <a href="${p.affiliate_link}" target="_blank" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm uppercase">Shop Deal</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if(i === 0) initDrag(card);
            });
        }

        function recordNope(id) {
            let nopes = getDislikedIds();
            nopes.push(id);
            localStorage.setItem('tp_nopes', JSON.stringify(nopes));
        }

        function initDrag(el) {
            let startX, moveX = 0, isDragging = false;
            el.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; el.style.transition = 'none'; });
            el.addEventListener('touchmove', (e) => { 
                if(!isDragging) return;
                moveX = e.touches[0].clientX - startX;
                el.style.transform = `translate3d(${moveX}px, 0, 0) rotate(${moveX/20}deg)`;
            });
            el.addEventListener('touchend', () => {
                isDragging = false; el.style.transition = 'all 0.5s ease';
                if (Math.abs(moveX) > 120) {
                    if (moveX < 0) recordNope(products[currentIndex].id);
                    el.style.transform = `translate3d(${moveX > 0 ? 1000 : -1000}px, 0, 0)`;
                    setTimeout(() => { currentIndex++; renderStack(); }, 200);
                } else { el.style.transform = 'translate3d(0,0,0)'; }
                moveX = 0;
            });
        }

        window.forceSwipe = (dir) => {
            const card = document.querySelector('.card');
            if(!card) return;
            if(dir === 'left') recordNope(products[currentIndex].id);
            card.style.transform = `translate3d(${dir === 'right' ? 1000 : -1000}px, 0, 0) rotate(${dir === 'right' ? 20 : -20}deg)`;
            setTimeout(() => { currentIndex++; renderStack(); }, 300);
        };

        load();
    </script>
</body>
</html>
