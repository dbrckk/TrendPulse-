<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Amazon Category Catalog | TrendPulse</title>

  <meta
    name="description"
    content="Browse popular Amazon products by category on TrendPulse. Discover frequently bought products with strong demand."
  />

  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://www.trend-pulse.shop/catalog-category.html" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Amazon Category Catalog | TrendPulse" />
  <meta property="og:description" content="Browse popular Amazon products by category." />
  <meta property="og:url" content="https://www.trend-pulse.shop/catalog-category.html" />
  <meta property="og:image" content="https://www.trend-pulse.shop/og-image.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Amazon Category Catalog | TrendPulse" />
  <meta name="twitter:description" content="Browse popular Amazon products by category." />
  <meta name="twitter:image" content="https://www.trend-pulse.shop/og-image.jpg" />

  <meta name="theme-color" content="#09090b" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- IMPORTANT: version pour forcer refresh -->
  <script src="/assets/js/supabase.js?v=20260404-4" defer></script>
  <script src="/assets/js/catalog-category.js?v=20260404-4" defer></script>

  <!-- SEO Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Amazon Category Catalog | TrendPulse",
    "url": "https://www.trend-pulse.shop/catalog-category.html",
    "description": "Browse popular Amazon products by category."
  }
  </script>
</head>

<body class="bg-zinc-950 text-zinc-100 antialiased pb-24 md:pb-0">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-zinc-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold text-white">TrendPulse</a>

      <nav class="hidden md:flex gap-5 text-sm text-zinc-300">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/deals.html" class="hover:text-white">Deals</a>
        <a href="/catalog.html" class="text-white">Catalog</a>
      </nav>

      <a href="/catalog.html" class="px-4 py-2 border border-zinc-700 rounded-full text-sm">
        Categories
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mx-auto max-w-7xl px-4 py-6">

    <!-- BREADCRUMB -->
    <nav class="mb-5 text-sm text-zinc-400">
      <a href="/" class="hover:text-white">Home</a>
      <span class="mx-2">/</span>
      <a href="/catalog.html" class="hover:text-white">Catalog</a>
      <span class="mx-2">/</span>
      <span id="catalog-category-breadcrumb" class="text-zinc-200">Category</span>
    </nav>

    <!-- HERO -->
    <section class="rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
      <h1 id="catalog-category-title" class="text-4xl font-bold text-white">
        Category
      </h1>

      <p id="catalog-category-description" class="mt-3 text-zinc-300">
        Browse products.
      </p>

      <p class="mt-2 text-xs text-zinc-500">
        Affiliate disclosure: we may earn commissions.
      </p>
    </section>

    <!-- FILTER -->
    <section class="mt-6 flex flex-col gap-4 sm:flex-row sm:justify-between">

      <input
        id="catalog-search"
        type="text"
        placeholder="Search..."
        class="w-full sm:w-64 px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-700 text-sm"
      />

      <select
        id="catalog-sort"
        class="px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-700 text-sm"
      >
        <option value="score">Best Ranked</option>
        <option value="reviews">Most Reviews</option>
        <option value="rating">Best Rating</option>
        <option value="price-low">Lowest Price</option>
        <option value="price-high">Highest Price</option>
      </select>

    </section>

    <!-- COUNT -->
    <div id="catalog-count" class="mt-4 text-sm text-zinc-400">
      0 products
    </div>

    <!-- GRID -->
    <div id="catalog-category-grid" class="mt-6 grid grid-cols-2 gap-4 xl:grid-cols-4"></div>

    <!-- EMPTY -->
    <div
      id="catalog-empty-state"
      class="hidden mt-8 text-center text-zinc-400"
    >
      No products found.
    </div>

    <!-- SEO + INTERNAL LINKING -->
    <section class="mt-10 grid gap-4 lg:grid-cols-2">

      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
        <h2 class="text-lg font-semibold text-white">About this category</h2>

        <p id="catalog-seo-text" class="mt-3 text-sm text-zinc-300">
          This category contains frequently bought Amazon products.
        </p>
      </div>

      <div class="rounded-3xl border border-zinc-800 bg-zinc-900 p-6">
        <h2 class="text-lg font-semibold text-white">Related categories</h2>

        <div id="related-categories" class="mt-4 flex flex-wrap gap-2"></div>
      </div>

    </section>

  </main>

  <!-- MOBILE NAV -->
  <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-800 bg-zinc-950 md:hidden">
    <div class="grid grid-cols-3 text-sm">
      <a href="/" class="py-3 text-center text-zinc-400">Home</a>
      <a href="/deals.html" class="py-3 text-center text-zinc-400">Deals</a>
      <a href="/catalog.html" class="py-3 text-center text-white">Catalog</a>
    </div>
  </nav>

</body>
</html>
