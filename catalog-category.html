<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog Category | TrendPulse</title>
  <meta name="description" content="Browse a dense Amazon catalog by category." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black text-white">
  <header class="border-b border-zinc-800 bg-zinc-950">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="/" class="text-xl font-bold">TrendPulse</a>
      <nav class="flex items-center gap-4 text-sm text-zinc-300">
        <a href="/">Home</a>
        <a href="/deals">Deals</a>
        <a href="/catalog" class="text-white">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-8">
      <h1 id="catalog-title" class="text-3xl font-bold">Category</h1>
      <p id="catalog-description" class="mt-2 text-zinc-400">Loading category...</p>
      <div id="catalog-count" class="mt-3 text-sm text-zinc-500">Loading products...</div>
    </div>

    <div id="products-container" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4"></div>
  </main>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/trendpulse-data.js"></script>
  <script src="/assets/js/trendpulse-ui.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const rawCategory =
        (pathParts[0] === "catalog" && pathParts[1]) ? decodeURIComponent(pathParts[1]) :
        (params.get("category") || "tech");

      const category = window.TrendPulseData.normalizeCategory(rawCategory);
      const title = document.getElementById("catalog-title");
      const desc = document.getElementById("catalog-description");
      const count = document.getElementById("catalog-count");

      title.textContent = `${category.charAt(0).toUpperCase() + category.slice(1)} Catalog`;
      desc.textContent = `Browse top Amazon products in ${category}.`;

      let products = await window.TrendPulseData.fetchCatalogByCategory(category, 60);

      if (!products.length) {
        products = await window.TrendPulseData.fetchTopProducts(24);
      }

      window.TrendPulseUI.renderProducts(products, "#products-container");
      count.textContent = `${products.length} ${products.length === 1 ? "product" : "products"}`;
    })();
  </script>
</body>
</html>
